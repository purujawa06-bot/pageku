<body class="text-gray-200 font-sans antialiased">

                            </div>

                            <div class="flex flex-wrap gap-2 mb-10">

                            <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3 max-h-[500px] overflow-y-auto pr-4">

            <!-- STREAMING PAGE -->

            <!-- SCHEDULE PAGE -->

    <nav class="md:hidden fixed bottom-0 w-full glass border-t border-gray-800 z-50 flex justify-around items-center py-5 rounded-t-[2.5rem] shadow-2xl">
        <a href="#home" class="flex flex-col items-center space-y-1" :class="page === 'home' ? 'text-blue-500' : 'text-gray-500'">
            <i class="fas fa-home text-2xl"></i>
            <span class="text-[10px] font-black uppercase">Home</span>
        </a>
        <a href="#genres" class="flex flex-col items-center space-y-1" :class="['genres', 'results'].includes(page) ? 'text-blue-500' : 'text-gray-500'">
            <i class="fas fa-layer-group text-2xl"></i>
            <span class="text-[10px] font-black uppercase">Genre</span>
        </a>
        <a href="#schedule" class="flex flex-col items-center space-y-1" :class="page === 'schedule' ? 'text-blue-500' : 'text-gray-500'">
            <i class="fas fa-calendar-alt text-2xl"></i>
            <span class="text-[10px] font-black uppercase">Jadwal</span>
        </a>

    <script>
        function puruTVApp() {
            return {
                title: 'PuruTV',
                page: 'home',
                loading: true,
                showSearch: false,
                searchQuery: '',
                searchTitle: '',
                activeServer: '',
                currentPage: 1,
                hasNextPage: false,
                homeData: {},
                animeDetail: {},
                streamData: {},
                scheduleData: [],
                allGenres: [],
                listData: [],

                init() {
                    window.addEventListener('hashchange', () => this.routeHandler());
                    this.routeHandler();
                },

                async routeHandler() {
                    const hash = window.location.hash || '#home';
                    const [viewPart, queryPart] = hash.split('?');
                    const params = new URLSearchParams(queryPart || '');
                    
                    const view = viewPart;
                    const url = params.get('url');
                    const slug = params.get('slug');
                    const q = params.get('q');
                    const page = parseInt(params.get('page')) || 1;

                    this.loading = true;
                    this.showSearch = false;
                    this.currentPage = page;

                    try {
                        if (view === '#home' || view === '') {
                            this.page = 'home';
                            await this.fetchHome();
                        } else if (view === '#detail' && url) {
                            this.page = 'detail';
                            await this.fetchDetail(url);
                        } else if (view === '#stream' && url) {
                            this.page = 'stream';
                            await this.fetchStream(url);
                        } else if (view === '#schedule') {
                            this.page = 'schedule';
                            await this.fetchSchedule();
                        } else if (view === '#genres') {
                            this.page = 'genres';
                            await this.fetchGenres();
                        } else if (view === '#genre' && slug) {
                            this.page = 'results';
                            await this.fetchByGenre(slug, page);
                        } else if (view === '#search' && q) {
                            this.page = 'results';
                            await this.fetchSearch(q, page);
                        }
                    } catch (err) {
                        console.error("Route Error:", err);
                    }
                    
                    this.loading = false;
                    window.scrollTo(0,0);
                },

                setHash(view, paramValue) {
                    if (view === 'detail' || view === 'stream') {
                        const cleanUrl = paramValue.includes('url=') ? paramValue.split('url=')[1] : paramValue;
                        window.location.hash = `#${view}?url=${cleanUrl}`;
                    } else if (view === 'genre') {
                        window.location.hash = `#genre?slug=${paramValue}&page=1`;
                    } else {
                        window.location.hash = `#${view}`;
                    }
                },

                changePage(newPage) {
                    const hash = window.location.hash;
                    const base = hash.split('&page=')[0];
                    window.location.hash = `${base}&page=${newPage}`;
                },

                startSearch() {
                    if (this.searchQuery.length < 2) return;
                    window.location.hash = `#search?q=${this.searchQuery}&page=1`;
                    this.searchQuery = '';
                },

                // API FETCHERS
                async fetchHome() {
                    const res = await fetch('https://puruboy-api.vercel.app/api/anime/anichin/home');
                    const data = await res.json();
                    this.homeData = data.result;
                },
                async fetchGenres() {
                    const res = await fetch('https://puruboy-api.vercel.app/api/anime/anichin/genres');
                    const data = await res.json();
                    this.allGenres = data.result;
                },
                async fetchByGenre(slug, page) {
                    this.searchTitle = `Genre: ${slug.replace(/-/g, ' ')}`;
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/genre?slug=${slug}&page=${page}`);
                    const data = await res.json();
                    this.listData = data.result.data;
                    this.hasNextPage = data.result.hasNextPage;
                },
                async fetchSearch(q, page) {
                    this.searchTitle = `Hasil Cari: ${q}`;
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/search?q=${q}&page=${page}`);
                    const data = await res.json();
                    this.listData = data.result.data;
                    this.hasNextPage = data.result.hasNextPage;
                },
                async fetchDetail(url) {
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/detail?url=${url}`);
                    const data = await res.json();
                    this.animeDetail = data.result;
                },
                async fetchStream(url) {
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/stream?url=${url}`);
                    const data = await res.json();
                    this.streamData = data.result;
                    this.activeServer = this.streamData.streamingLinks[0].link;
                },
                async fetchSchedule() {
                    const res = await fetch('https://puruboy-api.vercel.app/api/anime/anichin/schedule');
                    const data = await res.json();
                    this.scheduleData = data.result;
                }
            }
        }
    </script>
</body>
</html>
