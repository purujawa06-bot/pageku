</div></div><div class="p-4 bg-[#0f1117] border-t border-gray-800"><form @submit.prevent="sendChat()" class="relative max-w-3xl mx-auto"><input type="text" x-model="chatInput" placeholder="Ketik pertanyaan seputar donghua..." class="w-full bg-[#161922] border border-gray-700 rounded-2xl py-4 pl-6 pr-16 focus:outline-none focus:border-blue-500 text-sm transition shadow-inner placeholder:text-gray-600"><button type="submit" :disabled="chatLoading || !chatInput.trim()" class="absolute right-2 top-2 w-12 h-12 bg-blue-600 hover:bg-blue-700 disabled:opacity-30 disabled:grayscale text-white rounded-xl flex items-center justify-center transition-all shadow-lg shadow-blue-600/20"><i class="fas fa-paper-plane text-sm"></i></button></form></div></div></template></div></main><nav x-show="page !== 'chat'" class="md:hidden fixed bottom-0 w-full glass border-t border-gray-800 z-50 flex justify-around items-center py-4 rounded-t-3xl shadow-2xl"><a href="#home" class="flex flex-col items-center space-y-1" :class="page === 'home' ? 'text-blue-500' : 'text-gray-500'"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-black uppercase">Home</span></a><a href="#genres" class="flex flex-col items-center space-y-1" :class="['genres', 'results'].includes(page) ? 'text-blue-500' : 'text-gray-500'"><i class="fas fa-th-large text-xl"></i><span class="text-[9px] font-black uppercase">Genre</span></a><a href="#schedule" class="flex flex-col items-center space-y-1" :class="page === 'schedule' ? 'text-blue-500' : 'text-gray-500'"><i class="fas fa-calendar-day text-xl"></i><span class="text-[9px] font-black uppercase">Jadwal</span></a><a href="#history" class="flex flex-col items-center space-y-1 relative" :class="['history', 'trash'].includes(page) ? 'text-blue-500' : 'text-gray-500'"><span class="relative"><i class="fas fa-history text-xl"></i><span x-show="watchHistory.length > 0" x-cloak class="absolute -top-1.5 -right-2.5 bg-blue-600 text-white text-[8px] font-black px-1 rounded-full leading-tight" x-text="watchHistory.length"></span></span><span class="text-[9px] font-black uppercase">History</span></a></nav><div x-show="confirmModal.show" x-cloak class="confirm-modal-overlay" @click.self="confirmModal.show = false"><div class="confirm-modal-panel"><div class="flex items-center gap-3 mb-5"><div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" :class="confirmModal.danger ? 'bg-red-500/15 border border-red-500/30' : 'bg-yellow-500/15 border border-yellow-500/30'"><i class="text-lg" :class="confirmModal.danger ? 'fas fa-exclamation-triangle text-red-400' : 'fas fa-question-circle text-yellow-400'"></i></div><div><h3 class="font-black text-white text-base leading-tight" x-text="confirmModal.title"></h3><p class="text-gray-500 text-xs font-bold mt-0.5" x-text="confirmModal.subtitle"></p></div></div><p class="text-gray-400 text-sm mb-6 leading-relaxed" x-text="confirmModal.message"></p><div class="flex gap-3"><button @click="confirmModal.show = false" class="flex-1 py-3 rounded-xl bg-[#1f232d] hover:bg-gray-700 text-gray-300 font-black text-xs uppercase tracking-widest transition">Batal</button><button @click="confirmModal.action(); confirmModal.show = false" class="flex-1 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition" :class="confirmModal.danger ? 'bg-red-600 hover:bg-red-700 text-white shadow-lg shadow-red-600/20' : 'bg-blue-600 hover:bg-blue-700 text-white'" x-text="confirmModal.confirmText"></button></div></div></div><div x-show="importToast.show" x-cloak x-transition class="fixed bottom-24 md:bottom-6 left-1/2 -translate-x-1/2 z-[300] px-5 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl flex items-center gap-2" :class="importToast.ok ? 'bg-green-600 text-white' : 'bg-red-600 text-white'"><i :class="importToast.ok ? 'fas fa-check-circle' : 'fas fa-times-circle'"></i><span x-text="importToast.msg"></span></div><div x-show="aiPanel" x-cloak class="ai-modal-overlay" @click.self="aiPanel = false"><div class="ai-modal-panel"><div class="flex items-center justify-between mb-6"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30 flex-shrink-0"><i class="fas fa-robot text-white text-sm"></i></div><div><p class="text-[10px] text-blue-400 font-black uppercase tracking-widest" x-text="'AI Gemini - ' + currentType"></p><h4 class="text-sm font-black text-white leading-tight" x-text="'Penjelasan: ' + aiTitle"></h4></div></div><button @click="aiPanel = false" class="w-9 h-9 rounded-xl bg-[#1f232d] hover:bg-red-500/20 hover:text-red-400 flex items-center justify-center transition text-gray-400 flex-shrink-0"><i class="fas fa-times text-sm"></i></button></div><div x-show="aiLoading" class="py-16 flex flex-col items-center justify-center gap-4">
    <div class="w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
    <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest animate-pulse">AI sedang menganalisis...</p>
</div><div x-show="!aiLoading && aiError" x-cloak class="py-8 text-center"><i class="fas fa-exclamation-triangle text-3xl text-yellow-500 mb-3"></i><p class="text-sm text-gray-400" x-text="aiError"></p><button @click="openAIPanel(aiTitle)" class="mt-4 bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl text-xs font-black uppercase transition">Coba Lagi</button></div><div x-show="!aiLoading && !aiError && aiResult" x-cloak><div class="border-t border-gray-800 mb-6"></div><div class="md-content" x-html="aiResult"></div><div x-show="aiChoices.length > 0" class="mt-6 pt-5 border-t border-blue-900/40"><p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i class="fas fa-hand-pointer"></i>Pilih pertanyaan lanjutan</p><div class="flex flex-col gap-2"><template x-for="(choice, i) in aiChoices" :key="i"><button @click="askFollowUp(choice)" class="w-full text-left flex items-start gap-3 bg-[#1a1f2e] hover:bg-blue-600/20 border border-gray-800 hover:border-blue-500/50 px-4 py-3 rounded-xl text-xs font-bold text-gray-300 hover:text-white transition-all duration-200 group"><span class="flex-shrink-0 w-6 h-6 rounded-lg bg-blue-600/20 group-hover:bg-blue-600 flex items-center justify-center text-blue-400 group-hover:text-white font-black text-[10px] transition-all" x-text="i+1"></span><span x-text="choice" class="leading-snug pt-0.5"></span></button></template></div></div><div class="mt-6 pt-4 border-t border-gray-800 flex items-center gap-2"><i class="fas fa-info-circle text-gray-600 text-xs"></i><p class="text-[10px] text-gray-600 font-bold">Jawaban dihasilkan oleh AI. Bisa saja tidak 100% akurat.</p></div></div></div></div><script>function puruTVApp() {
            return {
                title: 'PuruTV',
                page: 'home',
                loading: true,
                showSearch: false,
                searchQuery: '',
                searchTitle: '',
                suggestions: [],
                showSuggestions: false,
                activeServer: '',
                currentPage: 1,
                hasNextPage: false,
                homeData: {},
                animeDetail: {},
                streamData: {},
                scheduleData: [],
                samehadakuSchedule: [],
                allGenres: [],
                listData: [],
                samehadakuData: {},
                samehadakuLoading: false,
                preferredServerHost: '',

                // Chat AI state
                chatMessages: [],
                chatInput: '',
                chatLoading: false,
                chatSessionId: 'puru-user-' + Math.random().toString(36).substring(7),

                // AI Panel state
                aiPanel: false,
                aiLoading: false,
                aiResult: '',
                aiError: '',
                aiTitle: '',
                aiChoices: [],
                _lastRawAnswer: '',

                // Watch history
                watchHistory: [],
                trashHistory: [],

                // Confirm modal
                confirmModal: { show: false, title: '', subtitle: '', message: '', confirmText: 'Hapus', danger: true, action: () => {} },

                // Import toast
                importToast: { show: false, ok: true, msg: '' },

                get currentType() {
                    return window.location.hash.includes('samehadaku') ? 'Anime' : 'Donghua';
                },

                init() {
                    this.watchHistory = JSON.parse(localStorage.getItem('puruTV_history') || '[]');
                    this.trashHistory = JSON.parse(localStorage.getItem('puruTV_trash') || '[]');
                    this.preferredServerHost = localStorage.getItem('puruTV_preferredServer') || '';
                    this._purgeExpiredTrash();
                    window.addEventListener('hashchange', () => this.routeHandler());
                    this.routeHandler();
                },

                cleanTitle(text) {
                    if (!text) return '';
                    return text.split('\t')[0].trim();
                },

                formatDate(iso) {
                    if (!iso) return '-';
                    const d = new Date(iso);
                    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                },
                formatTime(iso) {
                    if (!iso) return '';
                    const d = new Date(iso);
                    return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                },
                formatDateShort(iso) {
                    if (!iso) return '-';
                    const d = new Date(iso);
                    const now = new Date();
                    const diff = now - d;
                    const mins = Math.floor(diff / 60000);
                    if (mins < 1) return 'Baru saja';
                    if (mins < 60) return `${mins} mnt lalu`;
                    const hrs = Math.floor(mins / 60);
                    if (hrs < 24) return `${hrs} jam lalu`;
                    const days = Math.floor(hrs / 24);
                    if (days < 7) return `${days} hari lalu`;
                    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
                },

                async routeHandler() {
                    const hash = window.location.hash || '#home';
                    const [viewPart, queryPart] = hash.split('?');
                    const params = new URLSearchParams(queryPart || '');
                    
                    const view = viewPart;
                    const url = params.get('url');
                    const slug = params.get('slug');
                    const q = params.get('q');
                    const page = parseInt(params.get('page')) || 1;

                    // Anti-Caching: Clear data before every navigation to trigger fresh load & loader
                    this.homeData = {};
                    this.animeDetail = {};
                    this.streamData = {};
                    this.listData = [];
                    this.scheduleData = [];
                    this.samehadakuSchedule = [];

                    this.loading = true;
                    this.aiPanel = false; 
                    this.currentPage = page;

                    try {
                        if (view === '#home' || view === '') {
                            this.page = 'home';
                            await Promise.all([this.fetchHome(), this.fetchSamehadakuHome()]);
                        } else if (view === '#detail' && url) {
                            this.page = 'detail';
                            await this.fetchDetail(url);
                        } else if (view === '#stream' && url) {
                            this.page = 'stream';
                            await this.fetchStream(url);
                        } else if (view === '#schedule') {
                            this.page = 'schedule';
                            await this.fetchSchedule();
                        } else if (view === '#genres') {
                            this.page = 'genres';
                            await this.fetchGenres();
                        } else if (view === '#genre' && slug) {
                            this.page = 'results';
                            await this.fetchByGenre(slug, page);
                        } else if (view === '#search' && q) {
                            this.page = 'results';
                            await this.fetchSearch(q, page);
                        } else if (view === '#history') {
                            this.page = 'history';
                        } else if (view === '#chat') {
                            this.page = 'chat';
                            this.$nextTick(() => {
                                const el = this.$refs.chatBox;
                                if(el) el.scrollTop = el.scrollHeight;
                            });
                        } else if (view === '#trash') {
                            this.page = 'trash';
                            this._purgeExpiredTrash();
                        }
                    } catch (err) {
                        console.error("Route Error:", err);
                    }
                    
                    this.loading = false;
                    window.scrollTo(0,0);
                },

                setHash(view, paramValue) {
                    if (view === 'detail' || view === 'stream') {
                        let cleanUrl = paramValue;
                        if (paramValue.includes('url=')) {
                            cleanUrl = paramValue.split('url=')[1];
                        } else if (paramValue.includes('anichin.cafe')) {
                            const urlParts = new URL(paramValue);
                            cleanUrl = urlParts.pathname;
                        }
                        window.location.hash = `#${view}?url=${encodeURIComponent(cleanUrl)}`;
                    } else if (view === 'genre') {
                        window.location.hash = `#genre?slug=${paramValue}&page=1`;
                    } else {
                        window.location.hash = `#${view}`;
                    }
                },

                changePage(newPage) {
                    const params = new URLSearchParams(window.location.hash.split('?')[1]);
                    params.set('page', newPage);
                    const base = window.location.hash.split('?')[0];
                    window.location.hash = `${base}?${params.toString()}`;
                },

                async fetchSuggestions() {
                    if (this.searchQuery.length < 2) {
                        this.suggestions = [];
                        this.showSuggestions = false;
                        return;
                    }
                    try {
                        const res = await fetch(`https://puruboy-api.vercel.app/api/search/suggest?q=${encodeURIComponent(this.searchQuery)}`);
                        const data = await res.json();
                        if (data.success) {
                            this.suggestions = data.result;
                            this.showSuggestions = true;
                        }
                    } catch (e) { console.error("Suggest Error:", e); }
                },

                startSearch() {
                    if (this.searchQuery.length < 2) return;
                    window.location.hash = `#search?q=${this.searchQuery}&page=1`;
                    this.searchQuery = '';
                    this.suggestions = [];
                    this.showSuggestions = false;
                },

                // ✦ AI PANEL ✦
                parseAIJson(raw) {
                    // Bersihkan berbagai format kotor dari AI
                    let s = raw.trim();
                    // Hapus ```json ... ``` atau ``` ... ```
                    s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '').trim();
                    // Potong ke { ... } pertama & terakhir
                    const a = s.indexOf('{'), b = s.lastIndexOf('}');
                    if (a === -1 || b === -1) return null;
                    s = s.substring(a, b + 1);
                    try {
                        const p = JSON.parse(s);
                        return {
                            respon: p.respon || p.response || p.jawaban || '',
                            choice: Array.isArray(p.choice) ? p.choice : []
                        };
                    } catch(e) { return null; }
                },

                async openAIPanel(title) {
                    this.aiTitle = this.cleanTitle(title);
                    this.aiPanel = true;
                    this.aiLoading = true;
                    this.aiResult = '';
                    this.aiError = '';
                    this.aiChoices.splice(0);
                    this._lastRawAnswer = '';

                    const type = this.currentType;
                    const firstPrompt = `Kamu adalah asisten AI spesialis ${type.toLowerCase()}. Jawab dalam Bahasa Indonesia. HANYA balas dengan JSON valid, tanpa teks apapun di luar JSON. Format wajib: {"respon":"<isi jawaban markdown>","choice":["<pilihan 1>","<pilihan 2>","<pilihan 3>"]}. Minimal 3 pilihan relevan di array choice. Pertanyaan: ${type} "${this.aiTitle}" menceritakan tentang apa? Jelaskan sinopsis, karakter utama, tema, dan hal menarik lainnya.`;

                    await this._sendAIMessage(firstPrompt);
                },

                async askFollowUp(choiceLabel) {
                    if (this.aiLoading) return;
                    this.aiLoading = true;
                    this.aiChoices.splice(0);

                    const type = this.currentType;
                    const followPrompt = `Kamu adalah asisten AI spesialis ${type.toLowerCase()}. Jawab dalam Bahasa Indonesia. HANYA balas dengan JSON valid, tanpa teks apapun di luar JSON. Format wajib: {"respon":"<isi jawaban markdown>","choice":["<pilihan 1>","<pilihan 2>","<pilihan 3>"]}. Minimal 3 pilihan relevan. Konteks: kita membahas ${type.toLowerCase()} "${this.aiTitle}". Pertanyaan: ${choiceLabel}`;

                    await this._sendAIMessage(followPrompt);
                },

                async _sendAIMessage(prompt) {
                    try {
                        const res = await fetch('https://puruboy-api.vercel.app/api/ai/gemini', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt })
                        });
                        const data = await res.json();

                        if (data.success && data.result && data.result.answer) {
                            const raw = data.result.answer;
                            this._lastRawAnswer = raw;
                            const parsed = this.parseAIJson(raw);
                            if (parsed && parsed.respon) {
                                this.aiResult = marked.parse(parsed.respon);
                                this.aiChoices.splice(0, this.aiChoices.length, ...parsed.choice);
                            } else {
                                // Fallback jika JSON gagal parse
                                this.aiResult = marked.parse(raw);
                                this.aiChoices.splice(0);
                            }
                        } else {
                            this.aiError = 'Gagal mendapat respons dari AI. Silakan coba lagi.';
                        }
                    } catch (err) {
                        console.error('AI fetch error:', err);
                        this.aiError = 'Koneksi gagal. Pastikan internet aktif dan coba lagi.';
                    } finally {
                        this.aiLoading = false;
                    }
                },

                // ✦ WATCH HISTORY ✦
                _cleanSeriesUrl(raw) {
                    if (!raw) return '';
                    try {
                        if (raw.startsWith('http')) return new URL(raw).pathname;
                        if (raw.includes('url=')) return decodeURIComponent(raw.split('url=')[1]);
                        return raw;
                    } catch (e) { return raw; }
                },

                _saveAll() {
                    localStorage.setItem('puruTV_history', JSON.stringify(this.watchHistory));
                    localStorage.setItem('puruTV_trash', JSON.stringify(this.trashHistory));
                },

                _purgeExpiredTrash() {
                    const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
                    const now = Date.now();
                    this.trashHistory = this.trashHistory.filter(item => {
                        return item.deletedAt && (now - new Date(item.deletedAt).getTime()) < threeDaysMs;
                    });
                    localStorage.setItem('puruTV_trash', JSON.stringify(this.trashHistory));
                },

                trashExpiry(deletedAt) {
                    if (!deletedAt) return '';
                    const expiry = new Date(new Date(deletedAt).getTime() + 3 * 24 * 60 * 60 * 1000);
                    const diff = expiry - Date.now();
                    if (diff <= 0) return 'Kedaluwarsa';
                    const hrs = Math.floor(diff / 3600000);
                    if (hrs < 24) return `Hapus dalam ${hrs}j`;
                    return `Hapus dalam ${Math.floor(hrs/24)}h`;
                },

                saveHistory() {
                    const s = this.streamData;
                    if (!s || !s.series) return;

                    const seriesTitle = this.cleanTitle(s.series);
                    const episode     = s.title || '';
                    const watchedAt   = new Date().toISOString();
                    const urlParam    = new URLSearchParams(
                        (window.location.hash.split('?')[1] || '')
                    ).get('url') || '';

                    let epNum = '';
                    const epMatch = urlParam.match(/episode-(\d+)/);
                    if (epMatch) {
                        epNum = 'Ep. ' + epMatch[1];
                    } else if (episode.toLowerCase().includes('episode')) {
                        const parts = episode.split(/episode/i);
                        if (parts[1]) epNum = 'Ep. ' + parts[1].trim().split(' ')[0];
                    }

                    const idx = this.watchHistory.findIndex(h => h.seriesTitle === seriesTitle);
                    if (idx !== -1) this.watchHistory.splice(idx, 1);

                    this.watchHistory.unshift({ seriesTitle, episode, epNum, watchedAt, url: urlParam });
                    if (this.watchHistory.length > 20) this.watchHistory.length = 20;

                    this._saveAll();
                },

                _getProvider(url) {
                    if (!url) return 'anichin';
                    const decoded = decodeURIComponent(url);
                    return (decoded.includes('samehadaku') || decoded.includes('samehadaku.how')) ? 'samehadaku' : 'anichin';
                },

                // Confirm helpers
                confirmRemoveHistory(idx) {
                    const item = this.watchHistory[idx];
                    this.confirmModal = {
                        show: true, danger: true,
                        title: 'Hapus Riwayat?',
                        subtitle: item.seriesTitle,
                        message: 'History ini akan dipindahkan ke Tong Sampah dan bisa dikembalikan dalam 3 hari.',
                        confirmText: 'Pindah ke Sampah',
                        action: () => this.removeHistory(idx)
                    };
                },

                confirmClearHistory() {
                    this.confirmModal = {
                        show: true, danger: true,
                        title: 'Hapus Semua Riwayat?',
                        subtitle: `${this.watchHistory.length} riwayat akan dihapus`,
                        message: 'Semua history akan dipindahkan ke Tong Sampah. Kamu bisa mengembalikannya dalam 3 hari.',
                        confirmText: 'Hapus Semua',
                        action: () => this.clearHistory()
                    };
                },

                confirmEmptyTrash() {
                    this.confirmModal = {
                        show: true, danger: true,
                        title: 'Kosongkan Tong Sampah?',
                        subtitle: `${this.trashHistory.length} item akan dihapus permanen`,
                        message: 'Tindakan ini tidak bisa dibatalkan. Semua history di tong sampah akan dihapus selamanya.',
                        confirmText: 'Hapus Permanen',
                        action: () => this.emptyTrash()
                    };
                },

                confirmDeletePermanent(idx) {
                    const item = this.trashHistory[idx];
                    this.confirmModal = {
                        show: true, danger: true,
                        title: 'Hapus Permanen?',
                        subtitle: item.seriesTitle,
                        message: 'History ini akan dihapus selamanya dan tidak bisa dikembalikan.',
                        confirmText: 'Hapus Permanen',
                        action: () => { this.trashHistory.splice(idx, 1); this._saveAll(); }
                    };
                },

                removeHistory(idx) {
                    const [removed] = this.watchHistory.splice(idx, 1);
                    removed.deletedAt = new Date().toISOString();
                    this.trashHistory.unshift(removed);
                    this._saveAll();
                },

                clearHistory() {
                    const now = new Date().toISOString();
                    const withDeleted = this.watchHistory.map(h => ({ ...h, deletedAt: now }));
                    this.trashHistory.unshift(...withDeleted);
                    this.watchHistory = [];
                    this._saveAll();
                },

                restoreFromTrash(idx) {
                    const item = { ...this.trashHistory[idx] };
                    delete item.deletedAt;
                    this.trashHistory.splice(idx, 1);
                    // Remove dupe in history if any
                    const dupIdx = this.watchHistory.findIndex(h => h.seriesTitle === item.seriesTitle);
                    if (dupIdx !== -1) this.watchHistory.splice(dupIdx, 1);
                    this.watchHistory.unshift(item);
                    if (this.watchHistory.length > 20) this.watchHistory.length = 20;
                    this._saveAll();
                },

                restoreAllTrash() {
                    this.trashHistory.forEach(item => {
                        const clean = { ...item };
                        delete clean.deletedAt;
                        const dupIdx = this.watchHistory.findIndex(h => h.seriesTitle === clean.seriesTitle);
                        if (dupIdx !== -1) this.watchHistory.splice(dupIdx, 1);
                        this.watchHistory.unshift(clean);
                    });
                    if (this.watchHistory.length > 20) this.watchHistory.length = 20;
                    this.trashHistory = [];
                    this._saveAll();
                },

                emptyTrash() {
                    this.trashHistory = [];
                    this._saveAll();
                },

                // Import / Export
                exportHistory() {
                    const data = {
                        exported: new Date().toISOString(),
                        version: 1,
                        history: this.watchHistory
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `puruTV-history-${new Date().toISOString().slice(0,10)}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                },

                importHistory(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const parsed = JSON.parse(e.target.result);
                            const items = parsed.history || (Array.isArray(parsed) ? parsed : null);
                            if (!items) throw new Error('Format tidak valid');
                            let added = 0;
                            items.forEach(item => {
                                if (!item.seriesTitle) return;
                                const dupIdx = this.watchHistory.findIndex(h => h.seriesTitle === item.seriesTitle);
                                if (dupIdx !== -1) this.watchHistory.splice(dupIdx, 1);
                                this.watchHistory.push(item);
                                added++;
                            });
                            // Sort by watchedAt desc
                            this.watchHistory.sort((a,b) => new Date(b.watchedAt) - new Date(a.watchedAt));
                            if (this.watchHistory.length > 20) this.watchHistory.length = 20;
                            this._saveAll();
                            this._showToast(true, `${added} riwayat berhasil diimpor!`);
                        } catch(err) {
                            this._showToast(false, 'File tidak valid atau rusak.');
                        }
                        event.target.value = '';
                    };
                    reader.readAsText(file);
                },

                _showToast(ok, msg) {
                    this.importToast = { show: true, ok, msg };
                    setTimeout(() => { this.importToast.show = false; }, 3000);
                },

                // API FETCHERS
                async fetchHome() {
                    const res = await fetch('https://puruboy-api.vercel.app/api/anime/anichin/home');
                    const data = await res.json();
                    this.homeData = data.result;
                },
                async fetchSamehadakuHome() {
                    this.samehadakuLoading = true;
                    try {
                        const res = await fetch('https://puruboy-api.vercel.app/api/anime/samehadaku/home');
                        const data = await res.json();
                        this.samehadakuData = data.result;
                    } catch (e) { console.error("Samehadaku fetch error", e); }
                    finally { this.samehadakuLoading = false; }
                },
                async fetchGenres() {
                    const res = await fetch('https://puruboy-api.vercel.app/api/anime/anichin/genres');
                    const data = await res.json();
                    this.allGenres = data.result;
                },
                async fetchByGenre(slug, page) {
                    this.searchTitle = `Genre: ${slug.replace(/-/g, ' ')}`;
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/anichin/genre?slug=${slug}&page=${page}`);
                    const data = await res.json();
                    this.listData = data.result.data;
                    this.hasNextPage = data.result.hasNextPage;
                },
                async fetchSearch(q, page) {
                    this.searchTitle = `Hasil Cari: ${q}`;
                    this.listData = [];
                    this.hasNextPage = false;
                    
                    try {
                        const responses = await Promise.all([
                            fetch(`https://puruboy-api.vercel.app/api/anime/anichin/search?q=${q}&page=${page}`).then(r => r.json()),
                            fetch(`https://puruboy-api.vercel.app/api/anime/samehadaku/search?q=${q}&page=${page}`).then(r => r.json())
                        ]);

                        responses.forEach(res => {
                            if (res.success && res.result) {
                                const items = res.result.data || [];
                                this.listData = [...this.listData, ...items];
                                if (res.result.hasNextPage) this.hasNextPage = true;
                            }
                        });
                    } catch (e) {
                        console.error("Search Fetch Error:", e);
                    }
                },
                async fetchDetail(url) {
                    const provider = this._getProvider(url);
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/${provider}/detail?url=${encodeURIComponent(decodeURIComponent(url))}`);
                    const data = await res.json();
                    if (provider === 'samehadaku' && data.result.details) {
                        data.result.metadata = {
                            type: data.result.details.type,
                            status: data.result.details.status,
                            studio: data.result.details.studio,
                            updated_on: data.result.details.released
                        };
                    }
                    this.animeDetail = data.result;
                },
                async fetchStream(url) {
                    const provider = this._getProvider(url);
                    const currentUrlRaw = decodeURIComponent(url);
                    const res = await fetch(`https://puruboy-api.vercel.app/api/anime/${provider}/stream?url=${encodeURIComponent(currentUrlRaw)}`);
                    const data = await res.json();
                    
                    if (provider === 'samehadaku') {
                        // Logic Navigasi Manual untuk Samehadaku
                        try {
                            const detailRes = await fetch(data.result.series_url);
                            const detailData = await detailRes.json();
                            const epList = detailData.result.episodeList || [];
                            
                            // Helper untuk membandingkan slug URL
                            const getSlug = (u) => {
                                const dec = decodeURIComponent(u);
                                return dec.includes('url=') ? dec.split('url=')[1].replace(/\/$/, '') : dec.replace(/\/$/, '');
                            };

                            const currentSlug = getSlug(currentUrlRaw);
                            const currentIndex = epList.findIndex(e => getSlug(e.url) === currentSlug);

                            data.result.series = detailData.result.title;
                            data.result.navigation = {
                                // List biasanya urutan terbaru ke lama (index 0 = episode terbaru)
                                prevEpisode: currentIndex !== -1 && currentIndex < epList.length - 1 ? epList[currentIndex + 1].url : null,
                                nextEpisode: currentIndex !== -1 && currentIndex > 0 ? epList[currentIndex - 1].url : null,
                                allEpisodes: data.result.series_url
                            };
                        } catch (e) {
                            console.error("Samehadaku Navigation Error:", e);
                            data.result.navigation = { prevEpisode: null, nextEpisode: null, allEpisodes: data.result.series_url };
                        }

                        data.result.streamingLinks = (data.result.serverOptions || []).map(o => ({
                            server: o.name, link: o.embed_proxy, isProxy: true
                        }));
                        const normDl = [];
                        (data.result.downloadLinks || []).forEach(f => {
                            f.list.forEach(i => normDl.push({
                                quality: `${f.format} ${i.quality}`,
                                links: i.servers.map(s => ({ host: s.provider, link: s.url }))
                            }));
                        });
                        data.result.downloadLinks = normDl;
                    }

                    this.streamData = data.result;
                    const links = this.streamData.streamingLinks || [];
                    const prefIndex = links.findIndex(s => s.server === this.preferredServerHost);
                    const startLink = prefIndex !== -1 ? links[prefIndex] : (links[0] || null);
                    
                    if (startLink) {
                        this.changeServer(startLink.link, startLink.server, startLink.isProxy);
                    }
                    this.saveHistory();
                },
                async fetchSchedule() {
                    try {
                        const [aniRes, sameRes] = await Promise.all([
                            fetch('https://puruboy-api.vercel.app/api/anime/anichin/schedule').then(r => r.json()),
                            fetch('https://puruboy-api.vercel.app/api/anime/samehadaku/schedule').then(r => r.json())
                        ]);
                        
                        if (aniRes.success) this.scheduleData = aniRes.result;
                        if (sameRes.success) {
                            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
                            const dayMap = { monday: 'Senin', tuesday: 'Selasa', wednesday: 'Rabu', thursday: 'Kamis', friday: 'Jumat', saturday: 'Sabtu', sunday: 'Minggu' };
                            this.samehadakuSchedule = days.map(d => ({
                                day: dayMap[d],
                                list: sameRes.result[d] || []
                            }));
                        }
                    } catch (e) {
                        console.error("Schedule fetch error:", e);
                    }
                },

                async changeServer(link, serverName, isProxy = false) {
                    this.preferredServerHost = serverName;
                    localStorage.setItem('puruTV_preferredServer', serverName);
                    if (isProxy) {
                        try {
                            const res = await fetch(link);
                            const d = await res.json();
                            this.activeServer = d.result.embed_url;
                        } catch (e) { console.error("Embed fetch error", e); }
                    } else {
                        this.activeServer = link;
                    }
                },

                async sendChat() {
                    if (!this.chatInput.trim() || this.chatLoading) return;
                    const userMsg = this.chatInput;
                    this.chatInput = '';
                    this.chatMessages.push({ role: 'user', text: userMsg });
                    this.chatLoading = true;

                    this.$nextTick(() => {
                        const el = this.$refs.chatBox;
                        if(el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
                    });

                    try {
                        const res = await fetch('https://puruboy-api.vercel.app/api/ai/puruai', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                userid: this.chatSessionId,
                                prompt: userMsg,
                                model: "puruboy-flash",
                                system: "Kamu adalah AI asisten dari PuruTV (PuruBoy) yang ramah. Kamu ahli dalam memberikan rekomendasi Donghua (animasi China) dan menjawab pertanyaan seputar alur cerita, karakter, atau jadwal rilis donghua. Gunakan Bahasa Indonesia yang santai tapi sopan."
                            })
                        });
                        const data = await res.json();
                        if (data.success && data.result && data.result[0]) {
                            const aiMsg = data.result[0].parts[0].text;
                            this.chatMessages.push({ role: 'model', text: aiMsg });
                        } else {
                            this.chatMessages.push({ role: 'model', text: 'Maaf, sistem sedang sibuk. Coba tanya lagi nanti ya!' });
                        }
                    } catch (err) {
                        this.chatMessages.push({ role: 'model', text: 'Koneksi error. Pastikan internetmu aktif!' });
                    } finally {
                        this.chatLoading = false;
                        this.$nextTick(() => {
                            const el = this.$refs.chatBox;
                            if(el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
                        });
                    }
                }
            }
        }</script></body></html>
