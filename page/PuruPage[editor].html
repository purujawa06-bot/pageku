<!-- META {"title":"editor","desc":"Replace AI","date":"2026-06-10T19:27:08.870Z"} -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Writer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0c14;
      --surface: #141722;
      --surface2: #1c2030;
      --border: #2a2f3f;
      --text: #e2e6f0;
      --text2: #9aa0b5;
      --text3: #5c6278;
      --accent: #6c5ce7;
      --accent2: #8b7cf0;
      --green: #00d2a0;
      --red: #ff6b6b;
      --orange: #ff9f43;
      --radius: 14px;
      --radius-sm: 10px;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #6c5ce7, #a78bfa);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 14px rgba(108,92,231,0.4);
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, #fff, #c0c8e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 500;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: var(--font-sans);
      background: transparent;
      color: var(--text);
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(108,92,231,0.35);
    }
    .btn-success {
      background: #0d7a5f;
      color: #fff;
    }
    .btn-outline {
      border: 1px solid var(--border);
    }
    .btn-sm { padding: 5px 10px; font-size: 0.7rem; }
    .btn-xs { padding: 3px 8px; font-size: 0.65rem; border-radius: 14px; }
    .btn-icon {
      width: 34px; height: 34px; padding: 0; border-radius: 50%;
    }

    /* MAIN LAYOUT */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-panel {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      padding: 12px;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .tab-panel.active { display: flex; }

    /* BOTTOM NAV */
    .bottom-nav {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text3);
      font-size: 0.65rem;
      font-weight: 500;
      transition: 0.2s;
      position: relative;
      text-decoration: none;
    }
    .nav-btn.active {
      color: var(--accent2);
    }
    .nav-btn.active::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 24px; height: 3px;
      background: var(--accent);
      border-radius: 0 0 4px 4px;
    }
    .nav-btn i {
      font-size: 1.2rem;
      margin-bottom: 2px;
    }
    .nav-badge {
      position: absolute;
      top: 2px; right: calc(50% - 24px);
      background: var(--red);
      color: #fff;
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 10px;
      font-weight: 700;
      min-width: 16px;
      text-align: center;
      line-height: 1.2;
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .card-title {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* EDITOR */
    .editor-wrapper {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #0b0e17;
      min-height: 200px;
      max-height: 320px;
    }
    .line-numbers {
      background: #0f111c;
      color: var(--text3);
      padding: 12px 10px 12px 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      text-align: right;
      user-select: none;
      min-width: 44px;
      border-right: 1px solid var(--border);
      overflow: hidden;
      white-space: pre;
    }
    .code-textarea {
      flex: 1;
      background: transparent;
      color: #d4dae8;
      border: none;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      resize: none;
      outline: none;
      white-space: pre;
      overflow: auto;
    }
    .text-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      outline: none;
      resize: vertical;
      min-height: 44px;
    }
    textarea.text-input {
      font-family: var(--font-mono);
    }
    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* PROMPT OUTPUT */
    .prompt-output {
      background: #0a0e16;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      line-height: 1.5;
      color: #c4cde0;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* PREVIEW & CONSOLE */
    .preview-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      gap: 8px;
    }
    .preview-frame-wrap {
      flex: 1;
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 180px;
    }
    .preview-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .console-panel {
      background: #0b0e16;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      max-height: 150px;
      flex-shrink: 0;
    }
    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--text2);
    }
    .console-output {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: #b0bacc;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 100px;
    }
    .console-entry.error { color: var(--red); }
    .console-entry.warn { color: var(--orange); }
    .console-btn {
      background: transparent;
      border: none;
      color: var(--text2);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 2px 8px;
    }

    /* HISTORY */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    /* TOAST */
    .toast-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      width: 90%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 1.8s forwards;
      text-align: center;
      pointer-events: auto;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-wand-magic-sparkles"></i></div>
      <span class="logo-text">AI Writer</span>
    </div>
    <div class="header-actions">
      <span class="badge" id="lineCountBadge"><i class="far fa-file-code"></i> 0 baris</span>
      <button class="btn btn-outline btn-sm" onclick="openInNewTab()" title="Buka di tab baru">
        <i class="fas fa-external-link-alt"></i> Tab Baru
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">
    <!-- TAB CODE -->
    <div class="tab-panel active" id="panelCode">
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-code"></i> Kode Editor</span>
          <div class="btn-row">
            <button class="btn btn-outline btn-sm" onclick="resetCode()"><i class="fas fa-undo-alt"></i> Reset</button>
            <button class="btn btn-outline btn-sm" onclick="formatCode()"><i class="fas fa-indent"></i> Format</button>
          </div>
        </div>
        <div class="editor-wrapper">
          <div class="line-numbers" id="lineNumbers">1|</div>
          <textarea class="code-textarea" id="codeTextarea" placeholder="Tulis kode di sini..." spellcheck="false"></textarea>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-robot"></i> Response AI (XML)</span>
        </div>
        <textarea class="text-input" id="responseInput" placeholder="Paste XML dari AI..." rows="4" style="font-family:var(--font-mono);"></textarea>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-success" onclick="parseAndApply()"><i class="fas fa-check-circle"></i> Parse & Terapkan</button>
          <button class="btn btn-outline btn-sm" onclick="clearResponseInput()"><i class="fas fa-eraser"></i> Clear</button>
        </div>
      </div>
    </div>

    <!-- TAB CONVERT -->
    <div class="tab-panel" id="panelConvert">
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-pen-to-square"></i> Perubahan yang Diinginkan</span>
        </div>
        <textarea class="text-input" id="changeInput" placeholder="Contoh: Ubah warna latar jadi gelap, tambahkan animasi..." rows="3"></textarea>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-primary" onclick="generatePrompt()"><i class="fas fa-bolt"></i> Generate Prompt</button>
          <button class="btn btn-outline btn-sm" onclick="clearChangeInput()"><i class="fas fa-eraser"></i> Clear</button>
        </div>
      </div>
      <div class="card" id="promptCard" style="display:none;">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-clipboard-list"></i> Prompt AI</span>
          <div class="btn-row">
            <button class="btn btn-success btn-sm" onclick="copyPrompt()"><i class="fas fa-copy"></i> Salin</button>
            <a class="btn btn-outline btn-sm" href="https://chatgpt.com" target="_blank"><i class="fas fa-comment-dots"></i> ChatGPT</a>
            <a class="btn btn-outline btn-sm" href="https://gemini.google.com" target="_blank"><i class="fas fa-gem"></i> Gemini</a>
          </div>
        </div>
        <div class="prompt-output" id="promptOutput"></div>
      </div>
    </div>

    <!-- TAB HISTORY -->
    <div class="tab-panel" id="panelHistory">
      <div class="card" style="flex:1; display:flex; flex-direction:column;">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-history"></i> Riwayat Perubahan (10 terakhir)</span>
          <button class="btn btn-outline btn-xs" onclick="clearHistory()"><i class="fas fa-trash-can"></i> Hapus Semua</button>
        </div>
        <div class="history-list" id="historyList" style="flex:1; overflow-y:auto;"></div>
      </div>
    </div>

    <!-- TAB PREVIEW -->
    <div class="tab-panel" id="panelPreview">
      <div class="preview-area">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-eye"></i> Preview</span>
          <button class="btn btn-outline btn-sm" onclick="refreshPreview()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="preview-frame-wrap" id="previewFrameWrap">
          <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#aaa;" id="previewPlaceholder">
            <i class="fas fa-image" style="font-size:2rem; margin-right:8px;"></i> Klik Refresh untuk melihat hasil
          </div>
          <iframe id="previewIframe" style="display:none;" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
        <div class="console-panel">
          <div class="console-header">
            <span><i class="fas fa-terminal"></i> Console</span>
            <div>
              <button class="console-btn" onclick="copyConsole()"><i class="fas fa-copy"></i> Salin</button>
              <button class="console-btn" onclick="clearConsole()"><i class="fas fa-eraser"></i> Clear</button>
            </div>
          </div>
          <div class="console-output" id="consoleOutput"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn" data-tab="history" onclick="switchTab('history')">
      <i class="fas fa-history"></i>
      <span>History</span>
      <span class="nav-badge hidden" id="pasteBadge">0</span>
    </button>
    <button class="nav-btn" data-tab="convert" onclick="switchTab('convert')">
      <i class="fas fa-arrow-right-arrow-left"></i>
      <span>Convert</span>
    </button>
    <button class="nav-btn active" data-tab="code" onclick="switchTab('code')">
      <i class="fas fa-code"></i>
      <span>Code</span>
    </button>
    <button class="nav-btn" data-tab="preview" onclick="switchTab('preview')">
      <i class="fas fa-eye"></i>
      <span>Preview</span>
    </button>
  </nav>

  <!-- MODAL HISTORY DETAIL -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex; justify-content:space-between;">
        <h3 id="modalTitle">Detail</h3>
        <button class="btn btn-xs" onclick="closeModalDirect()"><i class="fas fa-times"></i></button>
      </div>
      <p id="modalDate" style="font-size:0.7rem; color:var(--text3);"></p>
      <p id="modalMessage" style="color:var(--green); margin:6px 0;"></p>
      <pre id="modalXml" style="background:#0b0e17; padding:8px; border-radius:6px; font-size:0.7rem; overflow:auto; max-height:200px;"></pre>
      <button class="btn btn-success btn-sm" style="margin-top:8px;" onclick="applyFromModal()"><i class="fas fa-check-circle"></i> Terapkan Ulang</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    (() => {
      // DOM elements
      const codeTextarea = document.getElementById('codeTextarea');
      const lineNumbers = document.getElementById('lineNumbers');
      const changeInput = document.getElementById('changeInput');
      const responseInput = document.getElementById('responseInput');
      const promptOutput = document.getElementById('promptOutput');
      const promptCard = document.getElementById('promptCard');
      const historyList = document.getElementById('historyList');
      const previewIframe = document.getElementById('previewIframe');
      const previewPlaceholder = document.getElementById('previewPlaceholder');
      const consoleOutput = document.getElementById('consoleOutput');
      const lineCountBadge = document.getElementById('lineCountBadge');
      const pasteBadge = document.getElementById('pasteBadge');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalXml = document.getElementById('modalXml');
      const modalTitle = document.getElementById('modalTitle');
      const modalDate = document.getElementById('modalDate');
      const modalMessage = document.getElementById('modalMessage');
      const toastContainer = document.getElementById('toastContainer');

      let currentTab = 'code';
      let modalCurrentIndex = null;
      let consoleMessages = [];

      const STORAGE_CODE = 'ai_writer_code_v4';
      const STORAGE_HISTORY = 'ai_writer_history_v4';

      const DEFAULT_CODE = `<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><title>Demo</title>
<style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f0f2f5;}.card{background:#fff;padding:2rem;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.1);text-align:center;}h1{color:#333;}button{background:#6c5ce7;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;}</style>
</head>
<body><div class="card"><h1>Halo Dunia!</h1><p>Edit kode ini dan gunakan AI Writer.</p><button onclick="alert('Klik!')">Klik Saya</button></div></body>
</html>`;

      function init() {
        const saved = localStorage.getItem(STORAGE_CODE);
        codeTextarea.value = (saved && saved.trim()) ? saved : DEFAULT_CODE;
        updateLineNumbers();
        updateLineCount();
        renderHistory();
        updatePasteBadge();
        setupPreviewListener();
        codeTextarea.addEventListener('input', () => { updateLineNumbers(); updateLineCount(); saveCode(); });
        codeTextarea.addEventListener('scroll', () => lineNumbers.scrollTop = codeTextarea.scrollTop);
        codeTextarea.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') { e.preventDefault(); const s=codeTextarea.selectionStart, v=codeTextarea.value; codeTextarea.value=v.substring(0,s)+'  '+v.substring(codeTextarea.selectionEnd); codeTextarea.selectionStart=codeTextarea.selectionEnd=s+2; updateLineNumbers(); }
        });
        document.addEventListener('keydown', (e) => {
          if ((e.ctrlKey||e.metaKey) && e.key==='g') { e.preventDefault(); generatePrompt(); switchTab('convert'); }
          if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); parseAndApply(); }
        });
        refreshPreviewSilent();
      }

      function updateLineNumbers() {
        const lines = codeTextarea.value.split('\n').length;
        // Format: 1|, 2|, 3|, ...
        lineNumbers.textContent = Array.from({length: lines}, (_,i) => (i+1)+'|').join('\n');
      }
      function updateLineCount() {
        lineCountBadge.innerHTML = `<i class="far fa-file-code"></i> ${codeTextarea.value.split('\n').length} baris`;
      }
      function saveCode() { localStorage.setItem(STORAGE_CODE, codeTextarea.value); }

      function showToast(msg, type='') {
        const t = document.createElement('div'); t.className=`toast ${type}`; t.innerHTML = msg;
        toastContainer.appendChild(t);
        setTimeout(() => t.remove(), 2200);
      }

      // Tabs
      window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
        const panelMap = {
          'history': 'panelHistory',
          'convert': 'panelConvert',
          'code': 'panelCode',
          'preview': 'panelPreview'
        };
        document.getElementById(panelMap[tab]).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');
        if(tab==='preview') refreshPreviewSilent();
        if(tab==='history') { renderHistory(); updatePasteBadge(); }
        if(tab==='code') updateLineNumbers();
      };

      // Preview & Console
      function setupPreviewListener() {
        window.addEventListener('message', (e) => {
          if (e.data && e.data.type === 'console') {
            addConsoleMessage(e.data.level, e.data.message);
          }
        });
      }
      function addConsoleMessage(level, msg) {
        consoleMessages.push({level, msg, time: new Date().toLocaleTimeString()});
        renderConsole();
      }
      function renderConsole() {
        consoleOutput.innerHTML = consoleMessages.map(m => 
          `<div class="console-entry ${m.level}">[${m.time}] ${m.msg}</div>`
        ).join('');
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
      }
      window.clearConsole = () => { consoleMessages = []; renderConsole(); };
      window.copyConsole = () => {
        const text = consoleMessages.map(m=>`[${m.time}] [${m.level}] ${m.msg}`).join('\n');
        navigator.clipboard.writeText(text).then(()=>showToast('<i class="fas fa-check"></i> Console disalin','success'));
      };

      function getPreviewHTML() {
        let code = codeTextarea.value.trim();
        if (!code) return '';
        if (!/<!DOCTYPE/i.test(code) && !/<html/i.test(code)) {
          return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Preview</title></head><body>${code}</body></html>`;
        }
        return code;
      }

      function injectConsoleScript(html) {
        const script = `<script>
          (function(){
            const orig={log:console.log,error:console.error,warn:console.warn,info:console.info};
            function send(lvl,args){
              try{
                const msg=args.map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' ');
                parent.postMessage({type:'console',level:lvl,message:msg},'*');
              }catch(e){}
            }
            console.log=function(...a){orig.log(...a);send('log',a);};
            console.error=function(...a){orig.error(...a);send('error',a);};
            console.warn=function(...a){orig.warn(...a);send('warn',a);};
            console.info=function(...a){orig.info(...a);send('info',a);};
            window.onerror=function(m,s,l,c,e){send('error',[m+' at line '+l+':'+c]);};
          })();
        <\/script>`;
        return html.replace('</body>', script + '</body>').replace('</html>', script + '</html>').replace(/<\/body>/i, script + '</body>');
      }

      function refreshPreviewSilent() {
        const html = getPreviewHTML();
        if (!html) {
          previewIframe.style.display='none';
          previewPlaceholder.style.display='flex';
          return;
        }
        previewPlaceholder.style.display='none';
        previewIframe.style.display='block';
        consoleMessages = [];
        renderConsole();
        previewIframe.srcdoc = injectConsoleScript(html);
      }
      window.refreshPreview = () => {
        refreshPreviewSilent();
        showToast('<i class="fas fa-eye"></i> Preview diperbarui','success');
      };

      // Open in new tab
      window.openInNewTab = () => {
        const html = getPreviewHTML();
        if (!html) { showToast('<i class="fas fa-exclamation-triangle"></i> Kode kosong','error'); return; }
        const w = window.open('about:blank', '_blank');
        if (!w) { showToast('<i class="fas fa-exclamation-triangle"></i> Pop-up diblokir!','error'); return; }
        w.document.write(injectConsoleScript(html));
        w.document.close();
        showToast('<i class="fas fa-external-link-alt"></i> Dibuka di tab baru','success');
      };

      // Generate prompt with multi‑edit instruction
      window.generatePrompt = () => {
        const code = codeTextarea.value.trim();
        const change = changeInput.value.trim();
        if(!code || !change) { showToast('<i class="fas fa-exclamation-circle"></i> Isi kode dan perubahan','error'); return; }
        const lines = code.split('\n');
        let numbered = lines.map((l,i)=> `${i+1}| ${l}`).join('\n');
        const sys = `[SYSTEM INSTRUCTION]
Anda adalah AI code editor yang sangat presisi. Tugas Anda adalah mengubah kode berdasarkan permintaan user.
BALAS HANYA DENGAN FORMAT XML BERIKUT. JANGAN ADA TEKS LAIN DI LUAR BLOK XML!

FORMAT WAJIB (bisa berisi lebih dari satu <edit>):
<response>
<message>Penjelasan singkat perubahan yang dilakukan</message>
<edit>
<start_line>nomor_baris_awal</start_line>
<end_line>nomor_baris_akhir</end_line>
<replace><![CDATA[
kode pengganti lengkap di sini (jaga indentasi)
]]></replace>
</edit>
<!-- Ulangi <edit> untuk setiap bagian kode yang diubah -->
</response>

ATURAN PENTING:
1. HANYA keluarkan XML, TIDAK BOLEH ada teks pembuka/penutup/markdown di luar <response>.
2. Gunakan <![CDATA[ ... ]]> untuk membungkus kode di dalam <replace>.
3. Nomor baris dimulai dari 1 (baris pertama = 1).
4. Untuk MENAMBAH kode baru di antara baris, gunakan start_line dan end_line yang SAMA (baris tempat penyisipan), lalu kode baru akan disisipkan SETELAH baris tersebut.
5. Untuk MENGHAPUS baris, gunakan <replace> kosong.
6. Pastikan indentasi dan format kode tetap rapi.
7. Jangan mengubah baris yang tidak perlu diubah.
8. Anda BOLEH menambahkan LEBIH DARI SATU <edit> jika perubahan mencakup beberapa bagian kode.`;
        promptOutput.textContent = `${sys}\n\nKODE LENGKAP DENGAN NOMOR BARIS:\n${numbered}\n\nPERUBAHAN YANG DIINGINKAN:\n${change}\n\nIngat: Balas HANYA dengan format XML <response>...</response> tanpa teks lain!`;
        promptCard.style.display='';
        promptCard.scrollIntoView({behavior:'smooth'});
        showToast('<i class="fas fa-bolt"></i> Prompt siap disalin','success');
      };
      window.copyPrompt = () => {
        navigator.clipboard.writeText(promptOutput.textContent).then(()=>showToast('<i class="fas fa-copy"></i> Prompt disalin','success'));
      };
      window.clearChangeInput = () => changeInput.value = '';
      window.clearResponseInput = () => responseInput.value = '';

      // Parse & Apply (supports multiple edits)
      window.parseAndApply = () => {
        const xmlStr = responseInput.value.trim();
        if(!xmlStr) { showToast('<i class="fas fa-exclamation-circle"></i> Paste XML dulu','error'); return; }
        let clean = xmlStr;
        const m = clean.match(/```(?:xml)?\s*([\s\S]*?)```/i);
        if(m) clean = m[1].trim();
        const respMatch = clean.match(/<response>[\s\S]*<\/response>/i);
        if(!respMatch) { showToast('<i class="fas fa-times-circle"></i> Blok <response> tidak ditemukan','error'); return; }
        clean = respMatch[0];
        let doc;
        try {
          const parser = new DOMParser();
          doc = parser.parseFromString(clean, 'text/xml');
          if(doc.querySelector('parsererror')) throw new Error('XML invalid');
        } catch(e) { showToast('<i class="fas fa-exclamation-circle"></i> Gagal parse XML','error'); return; }
        const msgEl = doc.querySelector('response > message');
        const message = msgEl ? msgEl.textContent.trim() : '';
        const editEls = doc.querySelectorAll('response > edit');
        if(!editEls.length) { showToast('<i class="fas fa-exclamation-circle"></i> Tidak ada <edit>','error'); return; }
        const edits = [];
        editEls.forEach(edit => {
          const s = edit.querySelector('start_line')?.textContent.trim();
          const e = edit.querySelector('end_line')?.textContent.trim();
          const r = edit.querySelector('replace')?.textContent || '';
          if(s && e) edits.push({start:parseInt(s), end:parseInt(e), replace:r.replace(/^\n+/,'').replace(/\n+$/,'')});
        });
        if(!edits.length) { showToast('<i class="fas fa-exclamation-circle"></i> Edit tidak valid','error'); return; }
        if(!confirm(`Terapkan ${edits.length} perubahan?\n\n${message}`)) return;
        const before = codeTextarea.value;
        let lines = before.split('\n');
        edits.sort((a,b)=> b.start - a.start);
        edits.forEach(ed => {
          const s = Math.max(0, ed.start-1), e = Math.max(0, ed.end-1);
          const repLines = ed.replace.split('\n');
          if(ed.replace==='') lines.splice(s, e-s+1);
          else lines.splice(s, e-s+1, ...repLines);
        });
        codeTextarea.value = lines.join('\n');
        updateLineNumbers(); updateLineCount(); saveCode();
        saveToHistory(clean, message, before, codeTextarea.value);
        responseInput.value = '';
        refreshPreviewSilent();
        showToast(`<i class="fas fa-check-circle"></i> ${edits.length} perubahan diterapkan!`,'success');
        updatePasteBadge(); renderHistory();
      };

      // History
      function getHistory() { try{return JSON.parse(localStorage.getItem(STORAGE_HISTORY)||'[]');}catch{return[];} }
      function saveToHistory(xml, msg, before, after) {
        const h = getHistory();
        h.unshift({id:Date.now(), date:new Date().toISOString(), xml, message:msg, before, after});
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(h.slice(0,10)));
      }
      function renderHistory() {
        const h = getHistory();
        historyList.innerHTML = h.length ? h.map((item,i)=>`
          <div class="history-item" onclick="viewHistoryDetail(${i})">
            <i class="fas fa-file-pen"></i>
            <div style="flex:1">
              <div style="font-size:0.8rem;">${escapeHtml(item.message||'')}</div>
              <div style="font-size:0.65rem;color:var(--text3);">${new Date(item.date).toLocaleString('id')}</div>
            </div>
            <button class="btn btn-outline btn-xs" onclick="event.stopPropagation();applyHistory(${i})"><i class="fas fa-rotate-left"></i></button>
            <button class="btn btn-outline btn-xs" onclick="event.stopPropagation();deleteHistory(${i})"><i class="fas fa-xmark"></i></button>
          </div>`).join('') : '<div style="text-align:center;padding:20px;color:var(--text3);"><i class="fas fa-inbox" style="font-size:2rem;"></i><p>Belum ada riwayat</p></div>';
      }
      window.viewHistoryDetail = (i) => {
        const item = getHistory()[i];
        if(!item) return;
        modalCurrentIndex = i;
        modalTitle.textContent = 'Detail #'+(i+1);
        modalDate.textContent = new Date(item.date).toLocaleString('id',{dateStyle:'full',timeStyle:'medium'});
        modalMessage.textContent = item.message;
        modalXml.textContent = item.xml;
        modalOverlay.classList.remove('hidden');
      };
      window.applyFromModal = () => {
        if(modalCurrentIndex===null) return;
        const item = getHistory()[modalCurrentIndex];
        responseInput.value = item.xml;
        modalOverlay.classList.add('hidden');
        switchTab('code');
        setTimeout(parseAndApply,200);
      };
      window.applyHistory = (i) => { responseInput.value = getHistory()[i].xml; switchTab('code'); setTimeout(parseAndApply,200); };
      window.deleteHistory = (i) => {
        const h = getHistory(); h.splice(i,1); localStorage.setItem(STORAGE_HISTORY, JSON.stringify(h));
        updatePasteBadge(); renderHistory();
      };
      window.clearHistory = () => { if(confirm('Hapus semua?')){ localStorage.setItem(STORAGE_HISTORY,'[]'); updatePasteBadge(); renderHistory(); }};
      function updatePasteBadge() {
        const count = getHistory().length;
        pasteBadge.textContent = count;
        pasteBadge.classList.toggle('hidden', count===0);
      }
      function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
      window.closeModal = (e) => { if(e.target===modalOverlay) modalOverlay.classList.add('hidden'); };
      window.closeModalDirect = () => modalOverlay.classList.add('hidden');

      window.resetCode = () => { if(confirm('Reset?')){ codeTextarea.value=DEFAULT_CODE; updateLineNumbers(); updateLineCount(); saveCode(); }};
      window.formatCode = () => { let c=codeTextarea.value.split('\n').map(l=>l.trimEnd()).join('\n'); if(!c.endsWith('\n'))c+='\n'; codeTextarea.value=c; updateLineNumbers(); saveCode(); };

      init();
    })();
  </script>
</body>
</html>
