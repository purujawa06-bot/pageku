<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI HTML Editor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Pyodide (Python for Browser) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-[100dvh] overflow-hidden text-gray-800">

    <div x-data="aiEditor()" class="w-full max-w-md h-full bg-white shadow-2xl relative flex flex-col">
        
        <!-- Header -->
        <header class="flex-shrink-0 bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md z-10">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <i class="fa-brands fa-python"></i> AI Editor
            </h1>
            <div class="flex gap-2">
                <button @click="downloadCode" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded text-sm transition font-medium shadow">
                    <i class="fa-solid fa-file-download"></i> Simpan
                </button>
                <label class="cursor-pointer bg-indigo-500 hover:bg-indigo-400 p-2 rounded text-sm transition font-medium shadow">
                    <i class="fa-solid fa-file-upload"></i> Upload
                    <input type="file" accept=".html" class="hidden" @change="uploadFile">
                </label>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 min-h-0 relative bg-gray-50 flex flex-col overflow-hidden">
            
            <!-- CHAT PAGE -->
            <div x-show="tab === 'chat'" class="h-full flex flex-col" x-transition.opacity>
                <!-- Chat Messages -->
                <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-container">
                    <template x-for="(msg, index) in chatHistory" :key="index">
                        <div class="flex flex-col" :class="msg.role === 'user' ? 'items-end' : 'items-start'">
                            <span class="text-[10px] text-gray-400 mb-1 font-semibold uppercase tracking-wider" 
                                  x-text="msg.role === 'user' ? 'Kamu' : 'AI'"></span>
                            
                            <div class="max-w-[85%] p-3 rounded-2xl shadow-sm text-sm"
                                 :class="msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : (msg.isErrorPrompt ? 'bg-red-50 text-red-800 border border-red-200 rounded-tr-none' : 'bg-white text-gray-800 border border-gray-200 rounded-tl-none')">
                                
                                <p class="whitespace-pre-wrap leading-relaxed" x-text="msg.content"></p>
                                
                                <!-- Feedback Indicator / Badge -->
                                <template x-if="msg.action">
                                    <div class="mt-2 pt-2 border-t border-gray-100/30 flex items-center gap-1">
                                        <span class="text-[10px] px-2 py-0.5 rounded-full font-bold flex items-center gap-1 bg-emerald-100 text-emerald-700">
                                            <i class="fa-brands fa-python"></i>
                                            <span x-text="msg.action"></span>
                                        </span>
                                    </div>
                                </template>

                            </div>
                        </div>
                    </template>

                    <!-- Loading / Loop Indicator -->
                    <div x-show="isProcessing" class="flex items-start">
                        <div class="bg-white border border-gray-200 p-3 rounded-2xl rounded-tl-none shadow-sm flex items-center gap-2">
                            <i class="fa-solid fa-circle-notch fa-spin text-indigo-600"></i>
                            <span class="text-sm text-gray-600">
                                AI sedang bekerja... 
                                <span x-show="loopCount > 0" class="text-xs font-bold text-red-500 ml-1">
                                    (Self-Healing: <span x-text="loopCount"></span>/10)
                                </span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="flex-shrink-0 bg-white border-t p-3 flex gap-2 items-center z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <input type="text" x-model="userInput" @keydown.enter="sendPrompt" :disabled="isProcessing || !pyodideReady"
                           :placeholder="pyodideReady ? 'Minta AI ubah kode...' : 'Memuat Python Engine...'" 
                           class="flex-1 bg-gray-100 text-sm rounded-full px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 transition">
                    <button @click="sendPrompt" :disabled="isProcessing || !pyodideReady || !userInput.trim()"
                            class="bg-indigo-600 text-white h-10 w-10 rounded-full flex justify-center items-center shadow-md disabled:bg-gray-400 transition transform active:scale-95">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <!-- CODE PAGE -->
            <div x-show="tab === 'code'" class="h-full flex flex-col" x-transition.opacity style="display: none;">
                <div class="flex-shrink-0 bg-[#2d2d2d] text-gray-300 text-xs px-4 py-2 flex justify-between items-center border-b border-black">
                    <span class="font-mono flex items-center gap-2"><i class="fa-brands fa-html5 text-orange-500 text-sm"></i> index.html</span>
                    <button @click="copyCode" class="hover:text-white transition flex items-center gap-1">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <textarea x-model="codeBase" spellcheck="false"
                          class="flex-1 w-full h-full min-h-0 bg-[#1e1e1e] text-[#d4d4d4] font-mono p-4 text-sm outline-none resize-none leading-relaxed"
                          placeholder="<!-- Tulis atau tempel kode HTML di sini -->"></textarea>
            </div>

            <!-- PREVIEW PAGE -->
            <div x-show="tab === 'preview'" class="h-full flex flex-col bg-white" x-transition.opacity style="display: none;">
                <div class="flex-shrink-0 bg-gray-200 text-gray-700 text-xs px-4 py-2 flex justify-between items-center border-b border-gray-300">
                    <span class="font-semibold flex items-center gap-2"><i class="fa-solid fa-eye text-indigo-500"></i> Hasil Render</span>
                    <button @click="updatePreview" class="hover:text-indigo-600 transition flex items-center gap-1">
                        <i class="fa-solid fa-rotate-right"></i> Refresh
                    </button>
                </div>
                <!-- Iframe for preview -->
                <div class="flex-1 min-h-0 w-full relative">
                    <iframe id="preview-frame" class="absolute inset-0 w-full h-full"></iframe>
                </div>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="flex-shrink-0 bg-white border-t flex justify-between text-gray-500 text-xs pb-[env(safe-area-inset-bottom)] shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-20 px-2">
            <button @click="tab = 'chat'" class="flex-1 py-3 flex flex-col items-center gap-1.5 transition"
                    :class="tab === 'chat' ? 'text-indigo-600 font-bold' : 'hover:text-indigo-400'">
                <i class="fa-solid fa-message text-lg"></i> Chat
            </button>
            <button @click="tab = 'code'" class="flex-1 py-3 flex flex-col items-center gap-1.5 transition"
                    :class="tab === 'code' ? 'text-indigo-600 font-bold' : 'hover:text-indigo-400'">
                <i class="fa-solid fa-code text-lg"></i> Code
            </button>
            <button @click="tab = 'preview'" class="flex-1 py-3 flex flex-col items-center gap-1.5 transition"
                    :class="tab === 'preview' ? 'text-indigo-600 font-bold' : 'hover:text-indigo-400'">
                <i class="fa-solid fa-play text-lg"></i> Preview
            </button>
        </nav>

        <!-- Toast Notification -->
        <div x-show="toastMsg" x-transition.duration.300ms class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm shadow-xl z-50 whitespace-nowrap">
            <i class="fa-solid fa-circle-check text-green-400 mr-1"></i>
            <span x-text="toastMsg"></span>
        </div>

        <!-- Popup Error Modal -->
        <div x-show="previewError" class="absolute inset-0 bg-black/60 z-50 flex justify-center items-end p-0" x-transition.opacity style="display: none;">
            <div class="bg-white rounded-t-2xl w-full max-w-md shadow-2xl flex flex-col" style="max-height: 80dvh;">
                
                <div class="flex-shrink-0 flex items-center justify-between gap-3 px-5 pt-5 pb-3 border-b border-gray-100">
                    <div class="flex items-center gap-3 text-red-600">
                        <div class="bg-red-100 p-2 rounded-full"><i class="fa-solid fa-triangle-exclamation text-lg"></i></div>
                        <h2 class="font-bold text-base">Error Terdeteksi!</h2>
                    </div>
                    <button @click="previewError = null" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
                </div>

                <div class="flex-1 overflow-y-auto px-5 py-3 min-h-0">
                    <p class="text-xs text-gray-500 mb-2">Log error lengkap dari preview:</p>
                    <div class="bg-gray-950 p-3 rounded-xl text-xs font-mono text-green-400 whitespace-pre-wrap border border-gray-800 leading-relaxed">
                        <span x-text="previewError"></span>
                    </div>
                </div>

                <div class="flex-shrink-0 px-5 py-4 border-t border-gray-100 bg-white rounded-t-none flex flex-col gap-2">
                    <p class="text-xs text-gray-500 text-center">Kirim error ini ke AI agar diperbaiki otomatis?</p>
                    <div class="flex gap-2">
                        <button @click="previewError = null" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-200 transition">Abaikan</button>
                        <button @click="sendErrorToAI" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700 shadow-md flex items-center justify-center gap-2 transition">
                            <i class="fa-solid fa-robot"></i> Send ke AI
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('aiEditor', () => ({
                tab: 'chat',
                codeBase: `<!DOCTYPE html>\n<html>\n<head>\n  <title>Halo Dunia</title>\n</head>\n<body>\n  <h1>Halo Dunia!</h1>\n  <button onclick="showAlert()">Klik Saya</button>\n  <script>\n    function showAlert() {\n      alert('Halo!');\n    }\n  <\/script>\n</body>\n</html>`,
                chatHistory: [{role: 'ai', content: 'Halo! Saya AI Editor. Mesin Python sedang dimuat...'}],
                userInput: '',
                isProcessing: false,
                loopCount: 0,
                maxLoops: 10,
                toastMsg: '',
                previewError: null,
                
                // Pyodide variables
                pyodide: null,
                pyodideReady: false,

                async init() {
                    this.$watch('tab', (val) => { if (val === 'preview') this.updatePreview(); });
                    this.$watch('codeBase', () => { if (this.tab === 'preview') this.updatePreview(); });

                    window.addEventListener('message', (event) => {
                        if (event.data && event.data.type === 'PREVIEW_ERROR') {
                            if (this.previewError) {
                                this.previewError = this.previewError + '\n\n' + event.data.error;
                            } else {
                                this.previewError = event.data.error;
                            }
                        }
                    });

                    // Muat library Pyodide secara Asynchronous
                    try {
                        this.pyodide = await loadPyodide();
                        this.pyodideReady = true;
                        this.chatHistory[0].content = 'Halo! Saya AI Editor berbasis Python. Skrip siap. Silahkan minta saya mengubah kode HTML ini!';
                    } catch (err) {
                        console.error("Gagal memuat Pyodide", err);
                        this.chatHistory.push({ role: 'ai', content: 'Gagal memuat Python Engine. Pastikan koneksi internet stabil lalu muat ulang halaman.'});
                    }
                },

                get systemPrompt() {
                    return `Kamu adalah AI HTML Editor tingkat lanjut.
Tugasmu adalah mengubah HTML codebase yang ada menggunakan skrip PYTHON.
Kamu TIDAK menulis ulang HTML secara langsung, melainkan menulis instruksi Python (seperti regex atau string replace) untuk mengubahnya.

Codebase saat ini:
<![CDATA[
${this.codeBase}
]]>

ATURAN WAJIB:
1. Balas HANYA dengan format XML berikut.
2. DILARANG MENGGUNAKAN MARKDOWN BACKTICKS (\`\`\`) SAMA SEKALI. Jangan bungkus XML atau Python dengan markdown.
3. Kode Python akan dijalankan di browser menggunakan Pyodide.
4. Kamu diberikan akses ke variabel global string bernama \`html_code\` yang berisi HTML saat ini.
5. Modifikasi variabel \`html_code\` tersebut. Hasil akhir dari variabel \`html_code\` akan menjadi codebase yang baru.

CONTOH JAWABAN YANG BENAR (Murni Tanpa Markdown):
<execution>
<responding>
Saya telah mengubah teks H1 dan warna latar belakang tombol menggunakan manipulasi string Python.
</responding>
<code>
import re
global html_code

# Contoh 1: Mengganti teks persis
html_code = html_code.replace('<h1>Halo Dunia!</h1>', '<h1>Dunia Baru!</h1>')

# Contoh 2: Menggunakan regex jika bagian yang diganti dinamis
html_code = re.sub(r'<button(.*?)>Klik Saya</button>', r'<button\\1 style="background: red;">Submit</button>', html_code)
</code>
</execution>

INGAT: NO MARKDOWN! Hanya output murni <execution> tag.`;
                },

                showToast(msg) {
                    this.toastMsg = msg;
                    setTimeout(() => this.toastMsg = '', 3000);
                },

                scrollToBottom() {
                    setTimeout(() => {
                        const container = document.getElementById('chat-container');
                        if (container) container.scrollTop = container.scrollHeight;
                    }, 100);
                },

                uploadFile(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.codeBase = e.target.result;
                        this.showToast('File berhasil diunggah!');
                        this.tab = 'code';
                    };
                    reader.readAsText(file);
                    event.target.value = '';
                },

                copyCode() {
                    navigator.clipboard.writeText(this.codeBase);
                    this.showToast('Kode berhasil disalin!');
                },

                downloadCode() {
                    try {
                        const blob = new Blob([this.codeBase], { type: 'text/html' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'index.html';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        this.showToast('File berhasil diunduh!');
                    } catch (err) {
                        this.showToast('Gagal mengunduh file');
                    }
                },

                updatePreview() {
                    const iframe = document.getElementById('preview-frame');
                    if (!iframe) return;

                    const errorCatcherScript = `
                        <script>
                            (function() {
                                var _allErrors = [];
                                var _errTimer = null;

                                function _report(detail) {
                                    _allErrors.push(detail);
                                    clearTimeout(_errTimer);
                                    _errTimer = setTimeout(function() {
                                        if (_allErrors.length > 0) {
                                            window.parent.postMessage({ type: 'PREVIEW_ERROR', error: _allErrors.join('\\n\\n---\\n\\n') }, '*');
                                        }
                                    }, 200);
                                }

                                function _fmtError(err) {
                                    if (!err) return '';
                                    var out = err.name ? err.name + ': ' + err.message : String(err);
                                    if (err.stack) {
                                        var lines = err.stack.split('\\n').slice(0, 5).join('\\n  ');
                                        out += '\\n  Stack:\\n  ' + lines;
                                    }
                                    return out;
                                }

                                window.onerror = function(msg, src, lineno, colno, err) {
                                    var detail;
                                    if (err) {
                                        detail = '[Runtime Error]\\n' + _fmtError(err);
                                        if (src) detail += '\\n  File: ' + src;
                                        if (lineno) detail += '\\n  Line: ' + lineno + (colno ? ', Col: ' + colno : '');
                                    } else {
                                        detail = '[Runtime Error] ' + msg;
                                        if (src) detail += '\\n  File: ' + src;
                                        if (lineno) detail += '\\n  Line: ' + lineno + (colno ? ', Col: ' + colno : '');
                                    }
                                    _report(detail);
                                    return true;
                                };

                                window.addEventListener('unhandledrejection', function(e) {
                                    _report('[Unhandled Promise Rejection]\\n' + (e.reason instanceof Error ? _fmtError(e.reason) : String(e.reason)));
                                });
                            })();
                        <\/script>
                    `;

                    let htmlContent = this.codeBase;
                    this.previewError = null;
                    if (htmlContent.includes('<head>')) {
                        htmlContent = htmlContent.replace('<head>', '<head>' + errorCatcherScript);
                    } else {
                        htmlContent = errorCatcherScript + htmlContent;
                    }

                    iframe.srcdoc = htmlContent;
                },

                sendErrorToAI() {
                    const errorMessage = `Perbaiki error HTML/JS berikut yang terdeteksi saat preview dijalankan:\n\n${this.previewError}\n\nBuat skrip python baru untuk mengedit codebase guna menyelesaikan error di atas.`;
                    this.previewError = null;
                    this.tab = 'chat';
                    
                    this.chatHistory.push({ role: 'user', content: errorMessage, isErrorPrompt: true });
                    this.scrollToBottom();

                    this.isProcessing = true;
                    this.loopCount = 0;
                    this.runAILoop(errorMessage);
                },

                async sendPrompt() {
                    if (!this.userInput.trim() || this.isProcessing || !this.pyodideReady) return;

                    const prompt = this.userInput;
                    this.userInput = '';
                    this.chatHistory.push({ role: 'user', content: prompt });
                    this.scrollToBottom();
                    
                    this.isProcessing = true;
                    this.loopCount = 0;

                    await this.runAILoop(prompt);
                },

                async runAILoop(userInstruction, errorFeedback = null) {
                    if (this.loopCount >= this.maxLoops) {
                        this.chatHistory.push({ 
                            role: 'ai', 
                            content: 'Gagal memperbarui kode setelah 10x loop perbaikan. Kode Python terus menerus menghasilkan error. Mohon tinjau ulang perintah Anda.' 
                        });
                        this.isProcessing = false;
                        this.scrollToBottom();
                        return;
                    }

                    try {
                        let finalPrompt = `${this.systemPrompt}\n\nInstruksi User: ${userInstruction}`;
                        
                        if (errorFeedback) {
                            finalPrompt += `\n\n[ERROR PADA EKSEKUSI PYTHON SEBELUMNYA]:\n${errorFeedback}\n\nPerbaiki script Python kamu. Jangan lupa untuk tetap menjaga format tag <execution>.`;
                        }

                        const response = await fetch("https://puruboy-api.vercel.app/api/ai/gemini-v2", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ prompt: finalPrompt })
                        });

                        const data = await response.json();
                        if (!data.success) throw new Error("Gagal terhubung ke API / Server Error.");

                        // Menjalankan Skrip Python buatan AI
                        await this.executeAIPython(data.result.answer);
                        
                        this.isProcessing = false;

                    } catch (error) {
                        console.warn(`[Self-Healing Loop ${this.loopCount + 1}]`, error.message);
                        this.loopCount++;
                        await this.runAILoop(userInstruction, error.message);
                    }
                },

                async executeAIPython(aiResponse) {
                    // Pre-processing: membersihkan markdown jika AI melanggar aturan No Markdown
                    let cleanResponse = aiResponse.replace(/```xml/gi, '').replace(/```python/gi, '').replace(/```html/gi, '').replace(/```/gi, '').trim();

                    const execMatch = cleanResponse.match(/<execution>([\s\S]*?)<\/execution>/i);
                    if (!execMatch) throw new Error("Format respons salah. Harap wajib gunakan tag <execution>.");

                    const execContent = execMatch[1];
                    const respondMatch = execContent.match(/<responding>([\s\S]*?)<\/responding>/i);
                    const codeMatch = execContent.match(/<code>([\s\S]*?)<\/code>/i);

                    if (!codeMatch) throw new Error("Tag <code> tidak ditemukan di dalam <execution>.");

                    const respondText = respondMatch ? respondMatch[1].trim() : "Kode HTML telah diubah via script Python.";
                    let pythonCode = codeMatch[1].trim();

                    // Eksekusi skrip Python via Pyodide
                    try {
                        // Daftarkan variabel global html_code ke environment python
                        this.pyodide.globals.set("html_code", this.codeBase);
                        
                        // Eksekusi skrip python asinkron
                        await this.pyodide.runPythonAsync(pythonCode);
                        
                        // Ambil hasil setelah dimanipulasi
                        let newCode = this.pyodide.globals.get("html_code");

                        if (typeof newCode !== 'string') {
                            throw new Error("Variabel html_code harus berupa tipe string! Tipe saat ini: " + typeof newCode);
                        }
                        
                        if (newCode.trim() === '') {
                            throw new Error("Variabel html_code menjadi kosong setelah dimanipulasi! Skrip Python tidak bekerja dengan benar.");
                        }

                        // Terapkan perubahan ke state utama
                        this.codeBase = newCode;
                        this.chatHistory.push({ 
                            role: 'ai', 
                            content: respondText, 
                            action: `Python Dieksekusi ✓` 
                        });
                        this.scrollToBottom();

                    } catch (err) {
                        // Lemparkan traceback asli kembali ke catch di runAILoop agar masuk Self-Healing
                        throw new Error(`Python Runtime Error:\n${err.message}\nPerbaiki kode Python tersebut. Pastikan variabel 'html_code' tidak mengalami TypeError dan logika regex/replace berjalan valid.`);
                    }
                }

            }));
        });
    </script>
</body>
</html>
