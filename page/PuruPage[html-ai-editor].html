<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>AI HTML Editor JSON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a; --bg-panel: #1e293b; --bg-input: #334155;
            --primary: #6366f1; --primary-hover: #4f46e5;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border: #334155; --danger: #ef4444;
            --radius-md: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0 }
        body {
            font-family: Inter, sans-serif; background-color: var(--bg-main);
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            background: rgba(30, 41, 59, .8); backdrop-filter: blur(10px);
            padding: 16px 24px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border); z-index: 10;
        }
        .logo { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px }
        .logo-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary) }
        
        main { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column }
        #agent-status {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(139, 92, 246, .2); color: #c4b5fd; padding: 6px 16px;
            border-radius: 9999px; font-size: 12px; z-index: 20; display: none;
            border: 1px solid rgba(139, 92, 246, .3);
        }

        .page { display: none; height: 100%; width: 100%; flex-direction: column }
        .page.active { display: flex }

        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px }
        .msg { padding: 12px 16px; border-radius: var(--radius-md); max-width: 85%; font-size: 14px; line-height: 1.5 }
        .msg.user { background: var(--primary); align-self: flex-end }
        .msg.ai { background: var(--bg-panel); align-self: flex-start; border: 1px solid var(--border) }
        .msg.system { color: var(--text-muted); font-size: 12px; align-self: center; text-align: center }

        .chat-input-area { padding: 16px; background: var(--bg-main); border-top: 1px solid var(--border); display: flex; gap: 8px }
        .chat-input-area input {
            flex: 1; padding: 12px 18px; background: var(--bg-input); color: #fff;
            border: 1px solid transparent; border-radius: 9999px; outline: none; font-size: 14px;
        }
        .chat-input-area button {
            padding: 0 20px; background: var(--primary); color: #fff; border: none;
            border-radius: 9999px; cursor: pointer; font-weight: 500;
        }

        #code-editor {
            flex: 1; background: #000; color: #adbac7; font-family: 'JetBrains Mono', monospace;
            padding: 20px; border: none; resize: none; outline: none; font-size: 13px; line-height: 1.6;
        }
        #preview-frame { flex: 1; width: 100%; border: none; background: #fff }

        .bottom-nav { display: flex; background: var(--bg-panel); border-top: 1px solid var(--border); padding: 5px }
        .nav-item { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-muted); font-size: 13px }
        .nav-item.active { color: var(--primary); font-weight: 600 }
        
        .json-indicator { color: #10b981; font-size: 11px; margin-top: 5px; display: block; font-style: normal }
    </style>
</head>
<body>
    <header>
        <div class="logo"><div class="logo-dot"></div>HTML AI Editor (JSON)</div>
        <button style="background:none; border:1px solid var(--danger); color:var(--danger); padding:4px 10px; border-radius:4px; cursor:pointer" onclick="clearChat()">Reset</button>
    </header>
    <main>
        <div id="agent-status">AI sedang memproses...</div>
        <div id="page-chat" class="page active">
            <div id="chat-history"><div class="system">Selamat datang. Sebutkan perubahan yang Anda inginkan pada kode.</div></div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Contoh: Ubah warna background ke merah..." onkeypress="if(event.key==='Enter')sendChat()">
                <button id="send-btn" onclick="sendChat()">Kirim</button>
            </div>
        </div>
        <div id="page-code" class="page">
            <textarea id="code-editor" spellcheck="false" oninput="currentCode=this.value"></textarea>
        </div>
        <div id="page-preview" class="page"><iframe id="preview-frame"></iframe></div>
    </main>
    <div class="bottom-nav">
        <div class="nav-item active" onclick='switchTab("chat")'>Chat</div>
        <div class="nav-item" onclick='switchTab("code")'>Code</div>
        <div class="nav-item" onclick='switchTab("preview")'>Preview</div>
    </div>

    <script>
        let currentCode = `<!DOCTYPE html>\n<html>\n<head>\n  <title>Preview</title>\n</head>\n<body style="font-family: sans-serif; text-align:center; padding-top:50px;">\n  <h1>Halo Dunia!</h1>\n  <p>Siap untuk diedit oleh AI.</p>\n</body>\n</html>`;
        let aiHistory = ""; 
        let isLooping = false;

        const systemPrompt = `[INSTRUKSI SISTEM - PENTING]
Kamu adalah AI Editor yang merespon dengan format JSON untuk mengedit kode.
HANYA gunakan tool edit sebagian. Jangan pernah menulis ulang seluruh file.

Format Respon Kamu:
Saya akan mengubah [penjelasan singkat].
\`\`\`json
{
  "edits": [
    {
      "old_string": "KODE_LAMA_PERSIS",
      "new_string": "KODE_BARU_PENGGANTI"
    }
  ]
}
\`\`\`

Aturan:
1. "old_string" harus sama PERSIS karakter per karakter dengan kode saat ini.
2. JANGAN masukkan blok JSON ke dalam "new_string".
3. Gunakan Bahasa Indonesia yang ramah.`;

        document.getElementById('code-editor').value = currentCode;
        updatePreview();

        function switchTab(tab) {
            document.querySelectorAll('.page, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
            if (tab === 'preview') updatePreview();
            if (tab === 'code') document.getElementById('code-editor').value = currentCode;
        }

        function updatePreview() {
            const iframe = document.getElementById('preview-frame');
            iframe.srcdoc = currentCode;
        }

        function addMessage(sender, text) {
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            
            // Masking JSON block for cleaner UI
            let cleanDisplay = text.replace(/```json[\s\S]*?```/g, '<i class="json-indicator">✓ Perubahan kode diterapkan dalam JSON</i>');
            div.innerHTML = cleanDisplay.replace(/\n/g, '<br>');
            
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        function clearChat() { aiHistory = ""; document.getElementById('chat-history').innerHTML = ""; }

        async function sendChat() {
            if (isLooping) return;
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            addMessage('user', val);
            input.value = '';
            aiHistory = ""; 
            startAgentLoop(val, false);
        }

        async function startAgentLoop(inputText, isRetry) {
            isLooping = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('agent-status').style.display = 'block';

            try {
                const payload = `[KODE TERBARU]\n\`\`\`html\n${currentCode}\n\`\`\`\n\n${isRetry ? `[ERROR SEBELUMNYA]\n${inputText}\n\n[LOG AI]\n${aiHistory}` : `[REQUEST USER]\n${inputText}`}\n\n${systemPrompt}`;

                const res = await fetch('https://puruboy-api.vercel.app/api/ai/gemini-v2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: payload })
                });
                
                const data = await res.json();
                if (data.success && data.result?.answer) {
                    const answer = data.result.answer;
                    addMessage('ai', answer);
                    await processJSON(answer);
                } else {
                    addMessage('system', 'Maaf, gagal menghubungi AI.');
                    stopAgentLoop();
                }
            } catch (e) {
                addMessage('system', 'Koneksi error: ' + e.message);
                stopAgentLoop();
            }
        }

        function sanitizeCode(text) {
            // Mencegah blok JSON tidak sengaja masuk ke kode
            return text.replace(/```json[\s\S]*?```/g, "").trim();
        }

        async function processJSON(response) {
            const jsonRegex = /```json\s*([\s\S]*?)\s*```/;
            const match = response.match(jsonRegex);

            if (match) {
                try {
                    const data = JSON.parse(match[1]);
                    let fails = 0;
                    let logs = "Hasil Eksekusi JSON:\n";

                    if (data.edits && Array.isArray(data.edits)) {
                        data.edits.forEach(edit => {
                            const oldS = edit.old_string;
                            const newS = sanitizeCode(edit.new_string);

                            if (currentCode.includes(oldS)) {
                                currentCode = currentCode.replace(oldS, newS);
                                logs += "- Berhasil diubah.\n";
                            } else {
                                fails++;
                                logs += "- Gagal: Kode lama tidak ditemukan.\n";
                            }
                        });
                    }

                    document.getElementById('code-editor').value = currentCode;
                    updatePreview();

                    if (fails > 0) {
                        aiHistory = response;
                        addMessage('system', 'Beberapa perubahan gagal. Mengulang...');
                        setTimeout(() => startAgentLoop(logs, true), 1500);
                    } else {
                        stopAgentLoop();
                    }
                } catch (e) {
                    addMessage('system', 'Format JSON dari AI tidak valid.');
                    stopAgentLoop();
                }
            } else {
                stopAgentLoop();
            }
        }

        function stopAgentLoop() {
            isLooping = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('agent-status').style.display = 'none';
        }
    </script>
</body>
</html>
