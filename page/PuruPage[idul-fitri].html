<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Selamat Idul Fitri 1447 H</title><style> :root { --primary-gold: #d4af37; --deep-green: #064e3b; --bright-gold: #fde68a; }  * { margin: 0; padding: 0; box-sizing: border-box; }  body { background-color: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }  #canvas-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }  .container { position: relative; z-index: 10; text-align: center; padding: 2rem; max-width: 90%; background: rgba(6, 78, 59, 0.2); backdrop-filter: blur(8px); border: 2px solid var(--primary-gold); border-radius: 20px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); animation: fadeIn 2s ease-out; }  @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }  .mosque-icon { font-size: 4rem; margin-bottom: 1rem; color: var(--primary-gold); display: block; }  h1 { font-size: 3rem; margin-bottom: 0.5rem; color: var(--primary-gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-family: 'Georgia', serif; }  .subtitle { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--bright-gold); }  .message { font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; color: #f8fafc; }  .arabic { font-size: 2.5rem; margin-bottom: 1rem; font-family: "Times New Roman", serif; direction: rtl; }  .footer { margin-top: 1rem; font-style: italic; opacity: 0.8; }  .firework-btn { background: var(--primary-gold); color: var(--deep-green); border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }  .firework-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6); background: var(--bright-gold); }  /* Decorative Elements */ .lantern { position: absolute; font-size: 2.5rem; animation: swing 3s ease-in-out infinite alternate; transform-origin: top center; top: -20px; }  @keyframes swing { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }  .l-1 { left: 10%; } .l-2 { right: 10%; }  @media (max-width: 600px) { h1 { font-size: 2rem; } .arabic { font-size: 1.8rem; } .container { padding: 1.5rem; } } </style></head><body><canvas id="canvas-bg"></canvas><div class="lantern l-1">🏮</div><div class="lantern l-2">🏮</div><div class="container"><div class="mosque-icon">🕌</div><div class="arabic">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</div><h1>Selamat Idul Fitri</h1><div class="subtitle">1 Syawal 1447 Hijriah</div><p class="message"> Suci hati, murni jiwa. <br> Mari kita rayakan hari kemenangan dengan penuh suka cita <br> dan saling memaafkan. </p><button class="firework-btn" onclick="triggerMassiveFirework()">Meriahkan Kemenangan!</button><div class="footer"> Mohon Maaf Lahir & Batin </div></div><script> const canvas = document.getElementById('canvas-bg'); const ctx = canvas.getContext('2d');  let width, height; let fireworks = []; let particles = [];  function init() { resize(); animate(); }  function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }  window.addEventListener('resize', resize);  class Firework { constructor() { this.x = Math.random() * width; this.y = height; this.targetY = Math.random() * (height * 0.5); this.speed = 3 + Math.random() * 3; this.color = `hsl(${Math.random() * 360}, 100%, 60%)`; this.isBlown = false; }  update() { this.y -= this.speed; if (this.y <= this.targetY) { this.isBlown = true; this.explode(); } }  draw() { ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }  explode() { const particleCount = 40 + Math.floor(Math.random() * 60); for (let i = 0; i < particleCount; i++) { particles.push(new Particle(this.x, this.y, this.color)); } } }  class Particle { constructor(x, y, color) { this.x = x; this.y = y; this.color = color; const angle = Math.random() * Math.PI * 2; const force = Math.random() * 6; this.vx = Math.cos(angle) * force; this.vy = Math.sin(angle) * force; this.alpha = 1; this.gravity = 0.05; }  update() { this.vx *= 0.98; this.vy *= 0.98; this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.alpha -= 0.01; }  draw() { ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.globalAlpha = 1; } }  function triggerMassiveFirework() { for(let i = 0; i < 5; i++) { setTimeout(() => { fireworks.push(new Firework()); }, i * 200); } }  function animate() { // Memberikan efek trail pada kembang api ctx.fillStyle = 'rgba(2, 6, 23, 0.2)'; ctx.fillRect(0, 0, width, height);  if (Math.random() < 0.03) { fireworks.push(new Firework()); }  for (let i = fireworks.length - 1; i >= 0; i--) { fireworks[i].update(); fireworks[i].draw(); if (fireworks[i].isBlown) { fireworks.splice(i, 1); } }  for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) { particles.splice(i, 1); } }  requestAnimationFrame(animate); }  window.onload = init;  // Klik pada canvas untuk membuat kembang api di titik tersebut canvas.addEventListener('click', (e) => { const f = new Firework(); f.x = e.clientX; f.targetY = e.clientY; fireworks.push(f); }); </script></body></html>
