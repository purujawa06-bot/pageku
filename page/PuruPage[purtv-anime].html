<!-- META {"title":"PurTV Anime","desc":"Nonton anime ","date":"2026-03-27T00:04:17.653Z"} -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurTV</title>

    <!-- 1. Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- 2. Alpine.js Plugins & Core (Gunakan 'defer' agar load setelah HTML selesai) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            background-color: #1a1d20;
            color: #eeeeee;
        }
        .card {
            background-color: #2b2f32;
            color: white;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .badge-rating {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
        }
        .img-container {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3/4;
        }
        .img-container img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
        .text-truncate-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Wadah Utama dengan Alpine x-data -->
    <div class="container my-5" x-data="{ 
        latest: [], 
        top10: [], 

        history: JSON.parse(localStorage.getItem('anime_history') || '[]'), 
        loading: true,

        view: 'home',
        detailData: null,
        streamData: null,
        embedUrl: null,
        activeServer: null,
        searchQuery: '',
        navOpen: false,
        searchResults: [],
        scheduleData: null,
        animeListData: null,
        translateDay(day) {
            const map = {
                'monday': 'Senin', 'tuesday': 'Selasa', 'wednesday': 'Rabu',
                'thursday': 'Kamis', 'friday': 'Jumat', 'saturday': 'Sabtu', 'sunday': 'Minggu'
            };
            return map[day.toLowerCase()] || day;
        },
        nav(path, params = {}) {
            const q = new URLSearchParams(params).toString();
            location.hash = path + (q ? '?' + q : '');
        },
        handleRouting() {
            const hash = location.hash || '#home';
            const [path, query] = hash.split('?');
            const p = new URLSearchParams(query || '');
            const urlParam = p.get('url');

            if (path === '#home') { 
                this.view = 'home'; 
                if(!this.latest.length) this.fetchData(); 
            } else if (path === '#schedule') {
                this.fetchSchedule();
            } else if (path === '#list') {
                this.fetchList(p.get('page') || 1);
            } else if (path === '#history') {
                this.view = 'history';
            } else if (path === '#search') {
                this.searchQuery = p.get('q') || '';
                this.searchAnime();
            } else if (path === '#detail' && urlParam) {
                this.fetchDetail(urlParam);
            } else if (path === '#stream' && urlParam) {
                this.fetchStream(urlParam);
            }
        },
        async fetchData() {
            try {
                const response = await fetch('https://puruboy-api.vercel.app/api/anime/samehadaku/home');
                const data = await response.json();
                if (data && data.result) {
                    this.latest = data.result.latestUpdates || [];
                    this.top10 = data.result.top10Weekly || [];
                    this.movies = data.result.projectMovies || [];
                }
            } catch (e) {
                console.error('Fetch error:', e);
            } finally {
                this.loading = false;
            }
        },
        async searchAnime() {
            if(!this.searchQuery) return;
            this.loading = true;
            try {
                const res = await fetch(`https://puruboy-api.vercel.app/api/anime/samehadaku/search?q=${encodeURIComponent(this.searchQuery)}`);
                const data = await res.json();
                this.searchResults = data.result;
                this.view = 'search';
            } catch (e) { console.error(e); } finally { this.loading = false; }
        },
        async fetchSchedule() {
            this.loading = true;
            try {
                const res = await fetch('https://puruboy-api.vercel.app/api/anime/samehadaku/schedule');
                const data = await res.json();
                this.scheduleData = data.result;
                this.view = 'schedule';
            } catch (e) { console.error(e); } finally { this.loading = false; }
        },
        async fetchList(page = 1) {
            this.loading = true;
            try {
                const res = await fetch(`https://puruboy-api.vercel.app/api/anime/samehadaku/list?page=${page}`);
                const data = await res.json();
                this.animeListData = data.result;
                this.view = 'list';
                window.scrollTo(0,0);
            } catch (e) { console.error(e); } finally { this.loading = false; }
        },
        async fetchDetail(url) {
            if (!url) return;
            let path = decodeURIComponent(url).split('url=')[1] || url;
            path = path.replace(/^https?:\/\/[^\/]+/, ''); 
            this.loading = true;
            try {
                const response = await fetch(`https://puruboy-api.vercel.app/api/anime/samehadaku/detail?url=${encodeURIComponent(path)}`);
                const data = await response.json();
                if (data && data.result) {
                    this.detailData = data.result;
                    this.view = 'detail';
                    window.scrollTo(0,0);
                }
            } catch (e) {
                console.error('Detail fetch error:', e);
            } finally {
                this.loading = false;
            }
        },
        async fetchStream(url) {
            if (!url) return;
            let path = decodeURIComponent(url).split('url=')[1] || url;
            path = path.replace(/^https?:\/\/[^\/]+/, '');
            this.loading = true;
            try {
                const response = await fetch(`https://puruboy-api.vercel.app/api/anime/samehadaku/stream?url=${encodeURIComponent(path)}`);
                const data = await response.json();
                if (data && data.result) {
                    this.streamData = data.result;

                    if (this.detailData && this.detailData.episodeList) {
                        const episodes = this.detailData.episodeList;
                        const getClean = (u) => (decodeURIComponent(u).split('url=')[1] || u).replace(/^https?:\/\/[^\/]+/, '');
                        const idx = episodes.findIndex(ep => getClean(ep.url || ep.original_url) === path);

                        if (idx !== -1) {
                            if (!this.streamData.prev_ep_url && !this.streamData.prev_episode && episodes[idx + 1]) {
                                this.streamData.prev_ep_url = episodes[idx + 1].url || episodes[idx + 1].original_url;
                            }
                            if (!this.streamData.next_ep_url && !this.streamData.next_episode && episodes[idx - 1]) {
                                this.streamData.next_ep_url = episodes[idx - 1].url || episodes[idx - 1].original_url;
                            }
                        }
                    }

                    this.view = 'stream';
                    
                    // Logic Update History
                    const hTitle = this.detailData?.title || this.streamData.title.split('Episode')[0].trim();
                    const hEp = this.streamData.title.match(/Episode\s\d+/)?.[0] || 'Episode Baru';
                    // Hapus jika sudah ada (mencegah duplikat title)
                    this.history = this.history.filter(h => h.title !== hTitle);
                    // Tambah ke paling atas
                    this.history.unshift({ 
                        title: hTitle, 
                        ep: hEp, 
                        url: path, 
                        thumb: this.detailData?.thumbnail || '' 
                    });
                    // Batasi 20 item
                    if(this.history.length > 20) this.history.pop();
                    localStorage.setItem('anime_history', JSON.stringify(this.history));

                    if(this.streamData.serverOptions && this.streamData.serverOptions.length > 0) {
                        const s = this.streamData.serverOptions[0];
                        this.fetchEmbed(s.post, s.nume, s.type);
                    }
                    window.scrollTo(0,0);
                }
            } catch (e) {
                console.error('Stream fetch error:', e);
            } finally {
                this.loading = false;
            }
        },
        async fetchEmbed(post, nume, type) {
            this.activeServer = nume;
            try {
                const response = await fetch(`https://puruboy-api.vercel.app/api/anime/samehadaku/embed?post=${post}&nume=${nume}&type=${type}`);
                const data = await response.json();
                if (data && data.result) {
                    this.embedUrl = data.result.embed_url;
                }
            } catch (e) {
                console.error('Embed fetch error:', e);
            }
        },
        removeHistory(url) {
            if(confirm('Hapus item ini dari riwayat?')) {
                this.history = this.history.filter(h => h.url !== url);
                localStorage.setItem('anime_history', JSON.stringify(this.history));
            }
        }
    }" x-init="handleRouting(); window.onhashchange = () => handleRouting()">
        
        <!-- Header & Toggle Button -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0 fw-bold text-primary"><i class="fas fa-tv me-2"></i>Pur<span class="text-white">TV</span></h4>
            <button class="btn btn-outline-light btn-sm" @click="navOpen = !navOpen">
                <span x-show="!navOpen">☰ Buka Menu</span>
                <span x-show="navOpen">✕ Tutup</span>
            </button>
        </div>

        <!-- Collapsible Navigation & Search Bar -->
        <div x-show="navOpen" x-collapse x-transition class="bg-dark p-3 rounded border border-secondary mb-4 shadow-sm">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-sm rounded-pill px-3" :class="view === 'home' ? 'btn-primary' : 'btn-outline-primary'" @click="nav('#home')">Home</button>
                    <button class="btn btn-sm rounded-pill px-3" :class="view === 'schedule' ? 'btn-warning' : 'btn-outline-warning'" @click="nav('#schedule')">Jadwal</button>
                    <button class="btn btn-sm rounded-pill px-3" :class="view === 'list' ? 'btn-info' : 'btn-outline-info'" @click="nav('#list', {page:1})">Daftar</button>
                    <button class="btn btn-sm rounded-pill px-3" :class="view === 'history' ? 'btn-danger' : 'btn-outline-danger'" @click="nav('#history')">Riwayat</button>
                </div>
                <div class="input-group input-group-sm" style="max-width: 300px;">
                    <input type="text" x-model="searchQuery" @keyup.enter="nav('#search', {q: searchQuery})" class="form-control bg-dark text-white border-secondary" placeholder="Cari anime...">
                    <button class="btn btn-primary" @click="nav('#search', {q: searchQuery})">Cari</button>
                </div>
            </div>
        </div>

        <!-- Indicator Halaman -->
        <div class="mb-4 d-flex align-items-center gap-2" x-show="!loading">
            <div class="spinner-grow spinner-grow-sm text-primary" role="status" style="width: 8px; height: 8px;"></div>
            <span class="text-uppercase fw-bold small text-secondary" style="letter-spacing: 1px; font-size: 0.7rem;">
                Lokasi: <span class="text-light" x-text="view === 'home' ? 'Beranda' : view === 'schedule' ? 'Jadwal Rilis' : view === 'list' ? 'Daftar Anime' : view === 'search' ? 'Hasil Pencarian' : view === 'detail' ? 'Detail Anime' : view === 'history' ? 'Riwayat Nonton' : 'Streaming Player'"></span>
            </span>
        </div>

        <template x-if="loading">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Memuat data anime...</p>
            </div>
        </template>

        <!-- History View -->
        <template x-if="!loading && view === 'history'">
            <div class="animate__animated animate__fadeIn">
                <div class="d-flex justify-content-between align-items-center mb-4 border-start border-4 border-danger ps-3">
                    <h3 class="mb-0">Riwayat Nonton</h3>
                    <button class="btn btn-sm btn-outline-danger" @click="if(confirm('Hapus semua riwayat nonton?')) { history = []; localStorage.removeItem('anime_history'); }">Hapus Semua</button>
                </div>
                <div class="row g-3">
                    <template x-for="item in history">
                        <div class="col-12 col-md-6">
                            <div class="card bg-dark border-secondary p-2 h-100 flex-row gap-3 position-relative" @click="fetchStream(item.url)" style="cursor: pointer;">
                                <button class="btn btn-sm text-secondary position-absolute top-0 end-0 m-1 p-0 px-1" style="z-index: 10; line-height: 1;" @click.stop="removeHistory(item.url)">&times;</button>
                                <img :src="item.thumb" style="width: 50px; height: 70px; object-fit: cover;" class="rounded bg-secondary" onerror="this.src='https://placehold.co/50x70?text=Anime'">
                                <div class="overflow-hidden">
                                    <h6 class="mb-1 text-truncate small fw-bold" x-text="item.title"></h6>
                                    <div class="badge bg-danger mb-1" style="font-size: 0.6rem;" x-text="item.ep"></div>
                                    <div class="small text-light opacity-50" style="font-size: 0.65rem;">Klik untuk lanjut menonton</div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <template x-if="history.length === 0">
                    <div class="text-center py-5 text-muted">
                        <p>Belum ada riwayat menonton.</p>
                        <button class="btn btn-primary btn-sm" @click="view = 'home'">Mulai Menonton</button>
                    </div>
                </template>
            </div>
        </template>

        <!-- Search View -->
        <template x-if="!loading && view === 'search' && searchResults">
            <div class="animate__animated animate__fadeIn">
                <h3 class="mb-4 border-start border-4 border-primary ps-3">Hasil Pencarian: <span x-text="searchResults.query"></span></h3>
                <div class="row g-3">
                    <template x-for="item in searchResults.data">
                        <div class="col-6 col-md-3">
                            <div class="card h-100 border-0 shadow-sm" @click="fetchDetail(item.url)" style="cursor: pointer;">
                                <div class="img-container">
                                    <img :src="item.thumbnail" class="card-img-top">
                                    <span class="badge bg-dark position-absolute top-0 end-0 m-2" x-text="item.score"></span>
                                </div>
                                <div class="card-body p-2">
                                    <h6 class="card-title text-truncate-2 mb-1 small fw-bold" x-text="item.title"></h6>
                                    <p class="card-text text-secondary small mb-0" style="font-size: 0.7rem;" x-text="item.status + ' • ' + item.type"></p>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <template x-if="searchResults.data.length === 0">
                    <div class="alert alert-secondary">Tidak ada hasil ditemukan.</div>
                </template>
            </div>
        </template>

        <!-- Schedule View -->
        <template x-if="!loading && view === 'schedule' && scheduleData">
            <div class="animate__animated animate__fadeIn">
                <h3 class="mb-4 border-start border-4 border-warning ps-3">Jadwal Rilis Mingguan</h3>
                <div class="row g-4">
                    <template x-for="(list, day) in scheduleData">
                        <div class="col-12">
                            <h5 class="text-uppercase fw-bold text-warning mb-3" x-text="translateDay(day)"></h5>
                            <div class="row g-2">
                                <template x-for="item in list">
                                    <div class="col-md-6">
                                        <div class="card bg-dark border-secondary p-2 h-100 flex-row gap-3" @click="fetchDetail(item.url)" style="cursor: pointer;">
                                            <img :src="item.thumbnail" style="width: 60px; height: 80px; object-fit: cover;" class="rounded">
                                            <div>
                                                <h6 class="mb-1 text-truncate small" x-text="item.title"></h6>
                                                <div class="badge bg-secondary mb-1" x-text="item.time"></div>
                                                <div class="small text-secondary" x-text="item.genres"></div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <hr class="border-secondary my-4">
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Directory List View -->
        <template x-if="!loading && view === 'list' && animeListData">
            <div class="animate__animated animate__fadeIn">
                <h3 class="mb-4 border-start border-4 border-info ps-3">Daftar Anime (Page <span x-text="animeListData.pagination.current_page"></span>)</h3>
                <div class="row g-3 mb-4">
                    <template x-for="item in animeListData.data">
                        <div class="col-6 col-md-3 col-lg-2">
                            <div class="card h-100 border-0 shadow-sm" @click="fetchDetail(item.url)" style="cursor: pointer;">
                                <div class="img-container">
                                    <img :src="item.thumbnail" class="card-img-top">
                                    <span class="badge bg-primary position-absolute bottom-0 start-0 m-2" x-text="item.score"></span>
                                </div>
                                <div class="card-body p-2">
                                    <h6 class="card-title text-truncate-2 mb-1 small fw-bold" x-text="item.title"></h6>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <!-- Pagination -->
                <div class="d-flex justify-content-center gap-2 mb-5">
                    <button class="btn btn-secondary" :disabled="animeListData.pagination.current_page === 1" 
                            @click="nav('#list', {page: animeListData.pagination.current_page - 1})">Prev</button>
                    <button class="btn btn-primary" disabled x-text="animeListData.pagination.current_page"></button>
                    <button class="btn btn-secondary" :disabled="!animeListData.pagination.has_next" 
                            @click="nav('#list', {page: animeListData.pagination.current_page + 1})">Next</button>
                </div>
            </div>
        </template>

        <template x-if="!loading && view === 'home'">
            <div>
                <!-- Top Section: Latest & Sidebar Top 10 -->
                <div class="row">
                    <!-- Latest Updates -->
                    <div class="col-lg-8">
                        <h3 class="mb-4 border-start border-4 border-primary ps-3">Update Terbaru</h3>
                        <div class="row g-3">
                            <template x-for="(item, index) in latest" :key="index">
                                <div class="col-6 col-md-3">
                                    <div class="card h-100 border-0 shadow-sm cursor-pointer" @click="nav('#detail', {url: item.url})" style="cursor: pointer;">
                                        <div class="img-container">
                                            <img :src="item.thumbnail" class="card-img-top" :alt="item.title">
                                            <span class="badge bg-primary position-absolute bottom-0 start-0 m-2" x-text="'Ep ' + item.episode"></span>
                                        </div>
                                        <div class="card-body p-2">
                                            <h6 class="card-title text-truncate-2 mb-1 small fw-bold" x-text="item.title"></h6>
                                            <p class="card-text text-secondary small mb-0" style="font-size: 0.7rem;" x-text="item.released"></p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Sidebar Top 10 -->
                    <div class="col-lg-4 mt-5 mt-lg-0">
                        <h3 class="mb-4 border-start border-4 border-warning ps-3">Top 10 Mingguan</h3>
                        <div class="list-group">
                            <template x-for="(item, index) in top10" :key="index">
                                <button @click="fetchDetail(item.url)" class="list-group-item list-group-item-action bg-dark text-white border-secondary d-flex align-items-center gap-3">
                                    <h4 class="mb-0 text-warning fw-bold" style="width: 30px;" x-text="item.rank"></h4>
                                    <img :src="item.thumbnail" style="width: 50px; height: 70px; object-fit: cover;" class="rounded">
                                    <div class="overflow-hidden text-start">
                                        <h6 class="mb-0 text-truncate small" x-text="item.title"></h6>
                                        <small class="text-warning">⭐ <span class="text-light" x-text="item.rating"></span></small>
                                    </div>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Movies Section -->
                <div class="mt-5">
                    <h3 class="mb-4 border-start border-4 border-danger ps-3">Proyek Film</h3>
                    <div class="row g-3">
                        <template x-for="(movie, index) in movies" :key="index">
                            <div class="col-6 col-md-2">
                                <div class="card h-100 border-0 bg-dark text-white cursor-pointer" @click="fetchDetail(movie.url)" style="cursor: pointer;">
                                    <div class="img-container">
                                        <img :src="movie.thumbnail" class="card-img-top">
                                    </div>
                                    <div class="card-body p-2">
                                        <h6 class="card-title text-truncate-2 mb-1 small fw-bold" x-text="movie.title"></h6>
                                        <p class="text-danger small mb-0" style="font-size: 0.65rem;" x-text="movie.genres"></p>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Streaming View Section -->
        <template x-if="!loading && view === 'stream' && streamData">
            <div class="animate__animated animate__fadeIn">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#" @click.prevent="view = 'home'" class="text-primary text-decoration-none">Beranda</a></li>
                        <li class="breadcrumb-item"><a href="#" @click.prevent="view = 'detail'" class="text-primary text-decoration-none" x-text="detailData?.title || 'Detail'"></a></li>
                        <li class="breadcrumb-item active text-white fw-bold" aria-current="page" x-text="streamData.title"></li>
                    </ol>
                </nav>

                <div class="row">
                    <div class="col-12">
                        <h3 class="mb-3 fw-bold" x-text="streamData.title.split('Sinopsis')[0]"></h3>
                        
                        <!-- Player Container -->
                        <div class="ratio ratio-16x9 bg-black rounded shadow-lg overflow-hidden mb-4">
                            <template x-if="embedUrl">
                                <iframe :src="embedUrl" allowfullscreen></iframe>
                            </template>
                            <template x-if="!embedUrl">
                                <div class="d-flex align-items-center justify-content-center text-muted">Memuat player...</div>
                            </template>
                        </div>

                        <!-- Episode Navigation -->
                        <div class="d-flex justify-content-between gap-2 mb-4">
                            <button class="btn btn-outline-primary flex-fill py-2" 
                                    x-show="streamData.prev_ep_url || streamData.prev_episode"
                                    @click="fetchStream(streamData.prev_ep_url || streamData.prev_episode)">
                                &laquo; Prev
                            </button>
                            <button class="btn btn-primary flex-fill py-2" @click="view = 'detail'">
                                Semua Episode
                            </button>
                            <button class="btn btn-outline-primary flex-fill py-2" 
                                    x-show="streamData.next_ep_url || streamData.next_episode"
                                    @click="fetchStream(streamData.next_ep_url || streamData.next_episode)">
                                Next &raquo;
                            </button>
                        </div>

                        <!-- Server Options -->
                        <div class="mb-5">
                            <p class="small fw-bold mb-2">PILIH SERVER STREAMING:</p>
                            <div class="d-flex flex-wrap gap-2">
                                <template x-for="server in streamData.serverOptions">
                                    <button class="btn btn-sm" 
                                            :class="activeServer === server.nume ? 'btn-primary' : 'btn-outline-primary'"
                                            @click="fetchEmbed(server.post, server.nume, server.type)" 
                                            x-text="server.name">
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Download Links -->
                        <div class="card bg-dark border-secondary mb-5">
                            <div class="card-header border-secondary bg-primary bg-opacity-10 py-3">
                                <h5 class="mb-0"><i class="bi bi-download me-2"></i>Link Download</h5>
                            </div>
                            <div class="card-body p-0">
                                <template x-for="download in streamData.downloadLinks">
                                    <div class="p-3 border-bottom border-secondary last-child-border-0">
                                        <h6 class="text-warning fw-bold mb-3" x-text="download.format"></h6>
                                        <div class="row g-2">
                                            <template x-for="item in download.list">
                                                <div class="col-12 mb-2">
                                                    <div class="d-md-flex align-items-center bg-secondary bg-opacity-10 p-2 rounded">
                                                        <div class="fw-bold me-3 text-info" style="min-width: 60px;" x-text="item.quality"></div>
                                                        <div class="d-flex flex-wrap gap-1">
                                                            <template x-for="srv in item.servers">
                                                                <a :href="srv.url" target="_blank" class="badge bg-secondary text-decoration-none px-2 py-1" x-text="srv.provider"></a>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Detail View Section -->
        <template x-if="!loading && view === 'detail' && detailData">
            <div class="animate__animated animate__fadeIn">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#" @click.prevent="view = 'home'" class="text-primary text-decoration-none">Beranda</a></li>
                        <li class="breadcrumb-item active text-light" x-text="detailData.title"></li>
                    </ol>
                </nav>

                <div class="row g-4">
                    <!-- Left: Poster and Quick Info -->
                    <div class="col-md-4 col-lg-3">
                        <img :src="detailData.thumbnail" class="img-fluid rounded shadow w-100 mb-3" :alt="detailData.title">
                        <div class="card border-secondary bg-dark p-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-warning text-dark fs-6">⭐ <span x-text="detailData.rating"></span></span>
                                <span class="badge bg-info" x-text="detailData.details.type"></span>
                            </div>
                            <hr class="border-secondary">
                            <ul class="list-unstyled small mb-0">
                                <li class="mb-2"><strong>Status:</strong> <span x-text="detailData.details.status"></span></li>
                                <li class="mb-2"><strong>Studio:</strong> <span x-text="detailData.details.studio"></span></li>
                                <li class="mb-2"><strong>Source:</strong> <span x-text="detailData.details.source"></span></li>
                                <li class="mb-2"><strong>Season:</strong> <span x-text="detailData.details.season"></span></li>
                                <li class="mb-2"><strong>Durasi:</strong> <span x-text="detailData.details.duration"></span></li>
                                <li class="mb-2"><strong>Episode:</strong> <span x-text="detailData.details.total_episode"></span></li>
                                <li><strong>Producers:</strong> <span x-text="detailData.details.producers"></span></li>
                            </ul>
                        </div>
                    </div>

                    <!-- Right: Details -->
                    <div class="col-md-8 col-lg-9">
                        <h2 class="fw-bold mb-2" x-text="detailData.title"></h2>
                        <p class="text-light opacity-50 fst-italic mb-3" x-text="detailData.details.japanese"></p>
                        
                        <div class="mb-4">
                            <template x-for="genre in detailData.genres">
                                <span class="badge border border-primary text-primary me-1 mb-1" x-text="genre"></span>
                            </template>
                        </div>

                        <div class="card bg-dark border-secondary mb-4">
                            <div class="card-header border-secondary bg-secondary bg-opacity-10 fw-bold">Sinopsis</div>
                            <div class="card-body">
                                <p class="card-text text-light" style="white-space: pre-line; opacity: 0.9;" x-text="detailData.synopsis"></p>
                            </div>
                        </div>

                        <h4 class="mb-3 border-start border-4 border-success ps-3">Daftar Episode</h4>
                        <div class="list-group mb-5">
                            <template x-for="ep in detailData.episodeList">
                                <button @click="nav('#stream', {url: ep.url || ep.original_url})" class="list-group-item list-group-item-action bg-dark text-white border-secondary d-flex justify-content-between align-items-center">
                                    <span x-text="ep.title"></span>
                                    <small class="text-muted" x-text="ep.date"></small>
                                </button>
                            </template>
                        </div>

                        <!-- Recommendations -->
                        <h4 class="mb-3 border-start border-4 border-info ps-3">Rekomendasi</h4>
                        <div class="row g-3">
                            <template x-for="rec in detailData.recommendations">
                                <div class="col-6 col-md-3">
                                    <div class="card h-100 border-0 bg-transparent" @click="fetchDetail(rec.url)" style="cursor: pointer;">
                                        <div class="img-container rounded">
                                            <img :src="rec.thumbnail" class="card-img-top">
                                            <span class="badge bg-dark opacity-75 position-absolute top-0 end-0 m-1" x-text="rec.rating"></span>
                                        </div>
                                        <div class="card-body p-2 px-0">
                                            <h6 class="card-title text-truncate small fw-bold mb-0" x-text="rec.title"></h6>
                                            <small class="text-secondary" x-text="rec.latest_eps"></small>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- 3. Bootstrap Bundle JS (Optional, untuk komponen seperti Modal/Dropdown) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
