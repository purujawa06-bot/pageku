<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HTML Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col overflow-hidden" 
      x-data="app()" 
      x-init="initApp()">

    <!-- Header -->
    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700 p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-indigo-500 rounded-full shadow-[0_0_10px_rgba(99,102,241,0.6)]"></div>
            <h1 class="font-semibold text-sm tracking-wide">AI HTML PRO</h1>
        </div>
        <div class="flex gap-2">
            <button @click="clearChat()" class="text-xs font-medium px-3 py-1.5 border border-red-500/50 text-red-400 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                Reset
            </button>
        </div>
    </header>

    <!-- Status Indicator -->
    <div x-show="isLooping" 
         x-transition 
         class="absolute top-20 left-1/2 -translate-x-1/2 z-20 bg-indigo-600/20 border border-indigo-500/30 text-indigo-300 px-4 py-1.5 rounded-full text-xs font-medium backdrop-blur-sm animate-pulse">
        AI sedang memproses perubahan...
    </div>

    <!-- Main Content -->
    <main class="flex-1 relative overflow-hidden flex flex-col">
        
        <!-- Tab Chat -->
        <div x-show="activeTab === 'chat'" class="flex-1 flex flex-col overflow-hidden">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                <template x-for="(msg, index) in chatHistory" :key="index">
                    <div :class="['max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed', 
                                 msg.role === 'user' ? 'bg-indigo-600 self-end ml-auto rounded-tr-none' : 
                                 msg.role === 'ai' ? 'bg-slate-800 border border-slate-700 self-start rounded-tl-none' : 
                                 'bg-transparent text-slate-400 text-xs self-center text-center w-full border-y border-slate-800 py-2']">
                        <span x-html="renderMessage(msg.content)"></span>
                    </div>
                </template>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-slate-900 border-t border-slate-800 flex gap-2">
                <input type="text" 
                       x-model="userInput" 
                       @keyup.enter="sendRequest()"
                       placeholder="Contoh: Buat navbar warna gelap..." 
                       class="flex-1 bg-slate-800 border border-slate-700 rounded-full px-5 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                <button @click="sendRequest()" 
                        :disabled="isLooping || !userInput.trim()"
                        class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:hover:bg-indigo-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Tab Code -->
        <div x-show="activeTab === 'code'" class="flex-1 flex flex-col overflow-hidden" x-cloak>
            <div class="bg-slate-800 px-4 py-2 flex justify-between items-center border-b border-slate-700">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Editor</span>
                <div class="flex gap-2">
                    <!-- Upload -->
                    <label class="cursor-pointer bg-slate-700 hover:bg-slate-600 text-slate-200 px-3 py-1 rounded text-xs transition-colors">
                        Upload
                        <input type="file" accept=".html" class="hidden" @change="uploadFile($event)">
                    </label>
                    <!-- Download -->
                    <button @click="downloadFile()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded text-xs transition-colors">
                        Download
                    </button>
                </div>
            </div>
            <textarea x-model="currentCode" 
                      class="flex-1 bg-slate-950 text-slate-300 p-4 code-font text-sm outline-none resize-none"></textarea>
        </div>

        <!-- Tab Preview -->
        <div x-show="activeTab === 'preview'" class="flex-1 bg-white" x-cloak>
            <iframe id="preview-frame" class="w-full h-full border-none"></iframe>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-slate-800 border-t border-slate-700 flex pb-safe">
        <button @click="activeTab = 'chat'" :class="activeTab === 'chat' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 py-3 text-xs font-medium transition-colors">Chat</button>
        <button @click="activeTab = 'code'" :class="activeTab === 'code' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 py-3 text-xs font-medium transition-colors">Code</button>
        <button @click="activeTab = 'preview'; updatePreview()" :class="activeTab === 'preview' ? 'text-indigo-400' : 'text-slate-400'" class="flex-1 py-3 text-xs font-medium transition-colors">Preview</button>
    </nav>

    <script>
        function app() {
            return {
                activeTab: 'chat',
                currentCode: `<!DOCTYPE html>\n<html lang="id">\n<head>\n    <meta charset="UTF-8">\n    <title>Preview</title>\n</head>\n<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen font-sans p-6 text-center">\n    <h1 class="text-4xl font-bold text-indigo-600 mb-4">Halo Dunia! ✨</h1>\n    <p class="text-slate-600 max-w-md">Ketik sesuatu di tab chat untuk mulai mengedit halaman ini menggunakan kecerdasan buatan.</p>\n</body>\n</html>`,
                userInput: '',
                chatHistory: [{ role: 'system', content: 'Siap membantu mengedit kode HTML Anda.' }],
                isLooping: false,
                aiErrorContext: '',
                
                initApp() {
                    this.updatePreview();
                },

                updatePreview() {
                    const iframe = document.getElementById('preview-frame');
                    if (!iframe) return;

                    // Injeksi Eruda & Tailwind CDN jika belum ada agar preview lebih mantap
                    let content = this.currentCode;
                    const eruda = `<script src="https://cdn.jsdelivr.net/npm/eruda"><\/script><script>eruda.init();<\/script>`;
                    const tailwind = `<script src="https://cdn.tailwindcss.com"><\/script>`;
                    
                    if (content.includes('</head>')) {
                        content = content.replace('</head>', tailwind + '\n</head>');
                    }
                    if (content.includes('</body>')) {
                        content = content.replace('</body>', eruda + '\n</body>');
                    } else {
                        content += eruda;
                    }

                    iframe.srcdoc = content;
                },

                renderMessage(content) {
                    // Sembunyikan blok JSON dari UI Chat
                    return content.replace(/```json[\s\S]*?```/g, '<div class="mt-2 text-[10px] text-emerald-400 flex items-center gap-1"><span>⚡</span> Kode telah dimodifikasi secara otomatis</div>').replace(/\n/g, '<br>');
                },

                async sendRequest() {
                    const text = this.userInput.trim();
                    if (!text || this.isLooping) return;

                    this.chatHistory.push({ role: 'user', content: text });
                    this.userInput = '';
                    this.aiErrorContext = ''; // Reset context untuk request baru
                    this.agentLoop(text, false);
                },

                async agentLoop(input, isRetry) {
                    this.isLooping = true;
                    
                    const systemInstruction = `[SISTEM - MODALITAS EDIT]
Tugas Anda adalah mengedit kode HTML user. Respon HANYA dengan JSON di dalam blok kode.

Format Respon:
Penjelasan singkat.
\`\`\`json
{
  "edits": [
    {
      "old_string": "KODE_LAMA_PERSIS",
      "new_string": "KODE_BARU"
    }
  ]
}
\`\`\`

Aturan:
- Gunakan Bahasa Indonesia.
- Jangan menimpa seluruh file jika tidak perlu.
- Jangan masukkan blok JSON ke dalam "new_string".
- <old_string> harus ada di kode saat ini.`;

                    const payload = `[KODE SAAT INI]\n\`\`\`html\n${this.currentCode}\n\`\`\`\n\n${isRetry ? `[LAPORAN GAGAL]\n${input}\n\n[LOG AI]\n${this.aiErrorContext}` : `[REQUEST USER]\n${input}`}\n\n${systemInstruction}`;

                    try {
                        const response = await fetch('https://puruboy-api.vercel.app/api/ai/gemini-v2', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt: payload })
                        });
                        
                        const data = await response.json();
                        if (data.success && data.result?.answer) {
                            const answer = data.result.answer;
                            this.chatHistory.push({ role: 'ai', content: answer });
                            this.applyEdits(answer);
                        }
                    } catch (e) {
                        this.chatHistory.push({ role: 'system', content: 'Gagal menghubungi server AI.' });
                        this.isLooping = false;
                    }
                },

                async applyEdits(aiResponse) {
                    const jsonRegex = /```json\s*([\s\S]*?)\s*```/;
                    const match = aiResponse.match(jsonRegex);

                    if (!match) {
                        this.isLooping = false;
                        return;
                    }

                    try {
                        const data = JSON.parse(match[1]);
                        let success = 0;
                        let failed = 0;
                        let feedback = "Feedback Eksekusi:\n";

                        if (data.edits && Array.isArray(data.edits)) {
                            data.edits.forEach(edit => {
                                // Antisipasi leak XML/JSON tag dalam new_string
                                const cleanNew = edit.new_string.replace(/```json[\s\S]*?```/g, "").trim();
                                if (this.currentCode.includes(edit.old_string)) {
                                    this.currentCode = this.currentCode.replace(edit.old_string, cleanNew);
                                    success++;
                                    feedback += "- Berhasil diedit.\n";
                                } else {
                                    failed++;
                                    feedback += "- Gagal: 'old_string' tidak ditemukan dalam kode.\n";
                                }
                            });
                        }

                        if (failed > 0) {
                            this.aiErrorContext = aiResponse;
                            this.chatHistory.push({ role: 'system', content: `Gagal mencocokkan ${failed} bagian kode. Mencoba memperbaiki...` });
                            setTimeout(() => this.agentLoop(feedback, true), 1000);
                        } else {
                            this.isLooping = false;
                            this.updatePreview();
                        }
                    } catch (e) {
                        this.isLooping = false;
                    }
                },

                uploadFile(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.currentCode = ev.target.result;
                        this.updatePreview();
                        this.chatHistory.push({ role: 'system', content: 'File berhasil dimuat.' });
                    };
                    reader.readAsText(file);
                },

                downloadFile() {
                    const blob = new Blob([this.currentCode], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'index.html';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                },

                clearChat() {
                    this.chatHistory = [{ role: 'system', content: 'History dibersihkan.' }];
                    this.aiErrorContext = '';
                }
            }
        }
    </script>
</body>
</html>
