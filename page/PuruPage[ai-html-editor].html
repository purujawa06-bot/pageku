<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI HTML Editor Pro</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>:root{--bg-main:#0f172a;--bg-panel:#1e293b;--bg-input:#334155;--primary:#6366f1;--primary-hover:#4f46e5;--gradient-chat:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);--text-main:#f8fafc;--text-muted:#94a3b8;--border:#334155;--danger:#ef4444;--danger-hover:#dc2626;--radius-lg:16px;--radius-md:12px;--radius-sm:8px;--shadow-float:0 10px 15px -3px rgba(0, 0, 0, 0.3),0 4px 6px -2px rgba(0, 0, 0, 0.15)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background-color:var(--bg-main);color:var(--text-main);display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}header{background:rgba(30,41,59,.8);backdrop-filter:blur(10px);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);z-index:10}.logo{font-weight:600;font-size:16px;letter-spacing:.5px;display:flex;align-items:center;gap:8px}.logo-dot{width:8px;height:8px;background:var(--primary);border-radius:50%;box-shadow:0 0 10px var(--primary)}button{font-family:inherit;transition:all .2s ease}.clear-btn{background:0 0;color:var(--danger);border:1px solid var(--danger);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500}.clear-btn:hover{background:var(--danger);color:#fff}main{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}#agent-status{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);padding:6px 16px;border-radius:9999px;font-size:12px;font-weight:500;z-index:20;display:none;backdrop-filter:blur(5px);box-shadow:var(--shadow-float);animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.page{display:none;height:100%;width:100%;flex-direction:column;animation:fadeIn .3s ease}.page.active{display:flex}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}#chat-history{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}.msg{padding:12px 18px;border-radius:var(--radius-md);max-width:80%;line-height:1.5;font-size:14px;word-wrap:break-word;box-shadow:0 2px 4px rgba(0,0,0,.1)}.msg.user{background:var(--gradient-chat);align-self:flex-end;border-bottom-right-radius:4px}.msg.ai{background:var(--bg-panel);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:4px}.msg.system{background:0 0;color:var(--text-muted);font-size:12px;align-self:center;box-shadow:none;padding:4px 0;display:flex;align-items:center;gap:6px}.msg.system::after,.msg.system::before{content:'';height:1px;width:20px;background:var(--border);display:inline-block}.chat-input-area{padding:16px 24px;background:var(--bg-main);border-top:1px solid var(--border);display:flex;gap:12px}.chat-input-area input{flex:1;padding:14px 20px;background:var(--bg-input);color:var(--text-main);border:1px solid transparent;border-radius:9999px;outline:0;font-family:inherit;font-size:14px;transition:border .3s,box-shadow .3s}.chat-input-area input:focus{border:1px solid var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.2)}.chat-input-area button{padding:0 24px;background:var(--primary);color:#fff;border:none;border-radius:9999px;cursor:pointer;font-weight:500;box-shadow:0 4px 6px -1px rgba(99,102,241,.4)}.chat-input-area button:hover:not(:disabled){background:var(--primary-hover);transform:translateY(-1px)}.chat-input-area button:disabled{background:var(--bg-input);color:var(--text-muted);cursor:not-allowed;box-shadow:none}.code-toolbar{padding:12px 24px;background:var(--bg-panel);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}.code-toolbar span{font-size:13px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}.code-actions{display:flex;gap:8px}.action-btn{background:var(--bg-input);color:var(--text-main);padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500}.action-btn:hover{background:var(--border)}.upload-btn-wrapper{position:relative;overflow:hidden;display:inline-block}.upload-btn-wrapper input[type=file]{font-size:100px;position:absolute;left:0;top:0;opacity:0;cursor:pointer;height:100%;width:100%}#code-editor{flex:1;width:100%;background:var(--bg-main);color:#e2e8f0;font-family:'JetBrains Mono',monospace;padding:20px;border:none;resize:none;outline:0;font-size:14px;line-height:1.6}#preview-frame{flex:1;width:100%;border:none;background:#fff}.bottom-nav{display:flex;background:rgba(30,41,59,.9);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom))}.nav-item{flex:1;text-align:center;padding:12px 0;cursor:pointer;color:var(--text-muted);font-size:14px;font-weight:500;transition:all .3s ease;border-radius:var(--radius-sm);margin:0 4px;position:relative}.nav-item:hover{color:var(--text-main);background:rgba(255,255,255,.05)}.nav-item.active{color:var(--primary);background:rgba(99,102,241,.1)}.nav-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:3px 3px 0 0}i.tool-indicator{color:var(--primary);font-style:normal;font-size:12px;display:flex;align-items:center;gap:6px;margin-top:8px;background:rgba(99,102,241,.1);padding:6px 10px;border-radius:6px}i.tool-indicator::before{content:'⚡'}</style></head><body><header><div class="logo"><div class="logo-dot"></div>AI HTML Pro</div><button class="clear-btn" onclick="clearChat()">Clear Chat</button></header><main><div id="agent-status">Agent is looping / thinking...</div><div id="page-chat" class="page active"><div id="chat-history"><div class="msg system">Ketik permintaan untuk membuat atau mengedit HTML.</div></div><div class="chat-input-area"><input type="text" id="user-input" placeholder="Buat tombol login warna biru..." onkeypress="handleEnter(event)" autocomplete="off"><button id="send-btn" onclick="sendChat()">Kirim</button></div></div><div id="page-code" class="page"><div class="code-toolbar"><span>Code Editor</span><div class="code-actions"><button class="action-btn" onclick="downloadCode()">Download</button><div class="upload-btn-wrapper"><button class="action-btn">Upload .html</button><input type="file" accept=".html" onchange="uploadFile(event)"></div></div></div><textarea id="code-editor" spellcheck="false" oninput="updateCodeFromEditor()"></textarea></div><div id="page-preview" class="page"><iframe id="preview-frame"></iframe></div></main><div class="bottom-nav"><div class="nav-item active" onclick='switchTab("chat")'>Chat</div><div class="nav-item" onclick='switchTab("code")'>Code</div><div class="nav-item" onclick='switchTab("preview")'>Preview</div></div><script>// State
        let currentCode = `<!DOCTYPE html>\n<html>\n<head>\n  <title>Preview</title>\n</head>\n<body style="font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">\n  <h1>Halo Dunia ✨</h1>\n</body>\n</html>`;
        let aiHistory = ""; 
        let latestUserInput = ""; 
        let isLooping = false;

        const systemPrompt = `Kamu adalah AI HTML Editor tingkat lanjut.
Aturan Tools:
1. Jika ingin MENIMPA seluruh kode (menulis dari awal), gunakan tool 'write_file':
<tools_call>
<nama>write_file</nama>
<new_string><![CDATA[...TULIS_SELURUH_KODE_BARU_DISINI...]]></new_string>
</tools_call>

2. Jika diminta MERUBAH sebagian kode, WAJIB gunakan tool 'edit_file':
<tools_call>
<nama>edit_file</nama>
<old_string><![CDATA[...TULIS_KODE_LAMA_DISINI...]]></old_string>
<new_string><![CDATA[...TULIS_KODE_BARU_DISINI...]]></new_string>
</tools_call>

3. Pastikan <old_string> sama PERSIS dengan bagian kode yang ingin diubah agar sistem bisa melakukan replace.
4. Kamu boleh menggunakan beberapa block <tools_call> sekaligus dalam satu respon.
5. Berikan pesan teks biasa yang ramah menjelaskan apa yang kamu lakukan di luar block XML.`;

        // Initialize
        document.getElementById('code-editor').value = currentCode;
        updatePreview();

        // UI Functions
        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');

            if(tab === 'preview') updatePreview();
            if(tab === 'code') document.getElementById('code-editor').value = currentCode;
        }

        function updateCodeFromEditor() {
            currentCode = document.getElementById('code-editor').value;
        }

        function uploadFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentCode = e.target.result;
                    document.getElementById('code-editor').value = currentCode;
                    updatePreview();
                    addMessage('system', 'File HTML berhasil diupload.');
                };
                reader.readAsText(file);
            }
        }

        function downloadCode() {
            const blob = new Blob([currentCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function updatePreview() {
            const iframe = document.getElementById('preview-frame');
            let injectedCode = currentCode;
            const erudaScript = `<script src="https://cdn.jsdelivr.net/npm/eruda"><\/script><script>eruda.init();<\/script>`;
            
            if (injectedCode.includes('</body>')) {
                injectedCode = injectedCode.replace('</body>', erudaScript + '\n</body>');
            } else {
                injectedCode += erudaScript;
            }
            iframe.srcdoc = injectedCode;
        }

        function addMessage(sender, text) {
            const chatHistory = document.getElementById('chat-history');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            
            let displayText = text;
            if(sender === 'ai') {
                displayText = text.replace(/<tools_call>[\s\S]*?<\/tools_call>/g, '<i class="tool-indicator">Kode Sedang Dimodifikasi</i>');
            }

            msgDiv.innerHTML = displayText.replace(/\n/g, '<br>');
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function clearChat() {
            aiHistory = "";
            latestUserInput = "";
            document.getElementById('chat-history').innerHTML = '<div class="msg system">Chat history dibersihkan.</div>';
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendChat();
        }

        // Fetch API with Exponential Backoff
        async function fetchWithBackoff(url, options, maxRetries = 4, baseDelayMs = 1000) {
            let attempt = 0;
            while (attempt < maxRetries) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                    return await response.json();
                } catch (error) {
                    attempt++;
                    if (attempt >= maxRetries) throw error;
                    const delay = baseDelayMs * Math.pow(2, attempt - 1);
                    addMessage('system', `Koneksi gagal, mencoba ulang dalam ${delay/1000}s... (${attempt}/${maxRetries-1})`);
                    await new Promise(res => setTimeout(res, delay));
                }
            }
        }

        // AI & Agent Logic
        async function sendChat() {
            if (isLooping) return;
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();
            if (!text) return;

            latestUserInput = text;
            addMessage('user', text);
            inputEl.value = '';
            
            startAgentLoop(text, false);
        }

        async function startAgentLoop(inputText, isSystemFeedback) {
            isLooping = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('agent-status').style.display = 'block';
            document.getElementById('agent-status').innerText = isSystemFeedback ? "Agent executing tools..." : "AI is thinking...";

            try {
                const promptPayload = `
${systemPrompt}

[KODE HTML SAAT INI]
\`\`\`html
${currentCode}
\`\`\`

[HISTORY JAWABAN AI]
${aiHistory}

[${isSystemFeedback ? 'LAPORAN SISTEM' : 'INPUT USER'}]
${inputText}
`;
                const data = await fetchWithBackoff('https://puruboy-api.vercel.app/api/ai/gemini-v2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptPayload })
                });
                
                if (data.success && data.result && data.result.answer) {
                    let aiResponse = data.result.answer;
                    
                    aiHistory += `\nAI: ${aiResponse}\n`;
                    addMessage('ai', aiResponse);

                    await processTools(aiResponse);
                } else {
                    addMessage('system', 'Error payload dari API.');
                    stopAgentLoop();
                }

            } catch (error) {
                addMessage('system', 'Gagal menghubungi API setelah beberapa percobaan: ' + error.message);
                stopAgentLoop();
            }
        }

        async function processTools(aiResponse) {
            let foundTools = false;
            let successCount = 0;
let failCount = 0;
            let systemFeedback = "Laporan Eksekusi Tools:\n";

            // 1. Regex process untuk write_file
            const writeRegex = /<tools_call>\s*<nama>write_file<\/nama>\s*<new_string><!\[CDATA\[([\s\S]*?)\]\]><\/new_string>\s*<\/tools_call>/g;
            let matchWrite;
            while ((matchWrite = writeRegex.exec(aiResponse)) !== null) {
                foundTools = true;
                currentCode = matchWrite[1];
                successCount++;
                systemFeedback += `- Sukses menimpa seluruh kode dengan write_file.\n`;
            }

            // 2. Regex process untuk edit_file
            const editRegex = /<tools_call>\s*<nama>edit_file<\/nama>\s*<old_string><!\[CDATA\[([\s\S]*?)\]\]><\/old_string>\s*<new_string><!\[CDATA\[([\s\S]*?)\]\]><\/new_string>\s*<\/tools_call>/g;
            let matchEdit;
            while ((matchEdit = editRegex.exec(aiResponse)) !== null) {
                foundTools = true;
                const oldString = matchEdit[1];
                const newString = matchEdit[2];

                if (currentCode.includes(oldString)) {
                    currentCode = currentCode.replace(oldString, newString);
                    successCount++;
                    systemFeedback += `- Sukses replace sebagian kode.\n`;
                } else {
                    failCount++;
                    systemFeedback += `- Gagal: <old_string> untuk edit_file tidak ditemukan di dalam kode saat ini. Pastikan old_string sama persis dengan kode yang ada.\n`;
                }
            }

            if (foundTools) {
                // Update UI Code & Preview
                document.getElementById('code-editor').value = currentCode;
                updatePreview();

                if (failCount > 0) {
                    addMessage('system', `Edit dieksekusi: ${successCount} sukses, ${failCount} gagal. Meloop kembali dalam 5 detik...`);
                    
                    // Agent Loop delay 5 detik jika ada gagal (atau butuh konfirmasi feedback sistem)
                    document.getElementById('agent-status').innerText = "Waiting 5s before loop...";
                    setTimeout(() => {
                        startAgentLoop(systemFeedback, true);
                    }, 5000);
                } else {
                    addMessage('system', 'Semua eksekusi tools berhasil diterapkan.');
                    stopAgentLoop();
                }
            } else {
                // Berhenti loop jika AI tidak mengirimkan tools_call
                stopAgentLoop();
            }
        }

        function stopAgentLoop() {
            isLooping = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('agent-status').style.display = 'none';
        }</script></body></html>
