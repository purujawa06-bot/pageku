<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI HTML Editor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Sembunyikan scrollbar untuk tampilan mobile */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-screen overflow-hidden text-gray-800">

    <!-- Mobile App Container -->
    <div x-data="aiEditor()" class="w-full max-w-md h-full bg-white shadow-2xl relative flex flex-col">
        
        <!-- Header -->
        <header class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md z-10">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> AI Editor
            </h1>
            <div>
                <label class="cursor-pointer bg-indigo-500 hover:bg-indigo-400 p-2 rounded text-sm transition font-medium shadow">
                    <i class="fa-solid fa-file-upload"></i> Upload
                    <input type="file" accept=".html" class="hidden" @change="uploadFile">
                </label>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-hidden relative bg-gray-50">
            
            <!-- CHAT PAGE -->
            <div x-show="tab === 'chat'" class="h-full flex flex-col relative" x-transition.opacity>
                <!-- Chat Messages -->
                <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-20" id="chat-container">
                    <template x-for="(msg, index) in chatHistory" :key="index">
                        <div class="flex flex-col" :class="msg.role === 'user' ? 'items-end' : 'items-start'">
                            <span class="text-[10px] text-gray-400 mb-1 font-semibold uppercase tracking-wider" 
                                  x-text="msg.role === 'user' ? 'Kamu' : 'AI'"></span>
                            
                            <div class="max-w-[85%] p-3 rounded-2xl shadow-sm text-sm"
                                 :class="msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-gray-800 border border-gray-200 rounded-tl-none'">
                                
                                <p class="whitespace-pre-wrap leading-relaxed" x-text="msg.content"></p>
                                
                                <!-- Feedback Indicator / Badge -->
                                <template x-if="msg.action">
                                    <div class="mt-2 pt-2 border-t border-gray-100/30 flex items-center gap-1">
                                        <span class="text-[10px] px-2 py-0.5 rounded-full font-bold flex items-center gap-1"
                                              :class="msg.action === 'Full Rewrite' ? 'bg-purple-100 text-purple-700' : 'bg-emerald-100 text-emerald-700'">
                                            <i class="fa-solid" :class="msg.action === 'Full Rewrite' ? 'fa-file-code' : 'fa-pen-to-square'"></i>
                                            <span x-text="msg.action"></span>
                                        </span>
                                    </div>
                                </template>

                            </div>
                        </div>
                    </template>

                    <!-- Loading / Loop Indicator -->
                    <div x-show="isProcessing" class="flex items-start">
                        <div class="bg-white border border-gray-200 p-3 rounded-2xl rounded-tl-none shadow-sm flex items-center gap-2">
                            <i class="fa-solid fa-circle-notch fa-spin text-indigo-600"></i>
                            <span class="text-sm text-gray-600">
                                AI sedang bekerja... 
                                <span x-show="loopCount > 0" class="text-xs font-bold text-red-500 ml-1">
                                    (Self-Healing: <span x-text="loopCount"></span>/10)
                                </span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="absolute bottom-0 left-0 w-full bg-white border-t p-3 flex gap-2 items-center z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <input type="text" x-model="userInput" @keydown.enter="sendPrompt" :disabled="isProcessing"
                           placeholder="Minta AI ubah kode..." 
                           class="flex-1 bg-gray-100 text-sm rounded-full px-4 py-2.5 outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 transition">
                    <button @click="sendPrompt" :disabled="isProcessing || !userInput.trim()"
                            class="bg-indigo-600 text-white h-10 w-10 rounded-full flex justify-center items-center shadow-md disabled:bg-gray-400 transition transform active:scale-95">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <!-- CODE PAGE -->
            <div x-show="tab === 'code'" class="h-full flex flex-col" x-transition.opacity style="display: none;">
                <div class="bg-[#2d2d2d] text-gray-300 text-xs px-4 py-2 flex justify-between items-center border-b border-black">
                    <span class="font-mono flex items-center gap-2"><i class="fa-brands fa-html5 text-orange-500 text-sm"></i> index.html</span>
                    <button @click="copyCode" class="hover:text-white transition flex items-center gap-1">
                        <i class="fa-regular fa-copy"></i> Salin
                    </button>
                </div>
                <textarea x-model="codeBase" spellcheck="false"
                          class="flex-1 w-full bg-[#1e1e1e] text-[#d4d4d4] font-mono p-4 text-sm outline-none resize-none leading-relaxed"
                          placeholder="<!-- Tulis atau tempel kode HTML di sini -->"></textarea>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-white border-t flex justify-around text-gray-500 text-xs pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-20">
            <button @click="tab = 'chat'" class="flex-1 py-3 flex flex-col items-center gap-1.5 transition"
                    :class="tab === 'chat' ? 'text-indigo-600 font-bold' : 'hover:text-indigo-400'">
                <i class="fa-solid fa-message text-lg"></i> Chat
            </button>
            <button @click="tab = 'code'" class="flex-1 py-3 flex flex-col items-center gap-1.5 transition"
                    :class="tab === 'code' ? 'text-indigo-600 font-bold' : 'hover:text-indigo-400'">
                <i class="fa-solid fa-code text-lg"></i> Code
            </button>
        </nav>

        <!-- Toast Notification -->
        <div x-show="toastMsg" x-transition.duration.300ms class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm shadow-xl z-50 whitespace-nowrap">
            <i class="fa-solid fa-circle-check text-green-400 mr-1"></i>
            <span x-text="toastMsg"></span>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('aiEditor', () => ({
                tab: 'chat',
                codeBase: `<!DOCTYPE html>\n<html>\n<head>\n  <title>Halo Dunia</title>\n</head>\n<body>\n  <h1>Halo Dunia!</h1>\n  <p>Selamat datang.</p>\n</body>\n</html>`,
                chatHistory: [{role: 'ai', content: 'Halo! Saya AI Editor. Tempelkan kode Anda di tab Code atau upload file, lalu minta saya menambahkan atau mengubah sesuatu!'}],
                userInput: '',
                isProcessing: false,
                loopCount: 0,
                maxLoops: 10,
                toastMsg: '',

                get systemPrompt() {
                    return `Kamu adalah AI HTML Editor tingkat lanjut. Kamu dapat membaca, memahami instruksi, dan mengubah kode.
Saat ini kode yang ada (Codebase) adalah:
\`\`\`html
${this.codeBase}
\`\`\`

ATURAN SANGAT KETAT:
1. Balas HANYA menggunakan format XML di bawah. Jangan tambahkan Markdown codeblock (\`\`\`) di luar tag <execution>.
2. Di dalam <find>, tulis tag <element> (kode lama) dan <change> (kode baru). 
3. Teks di dalam <element> HARUS IDENTIK PERSIS dengan codebase. Jangan diubah/diterjemahkan entitas HTML-nya (tulis tag murni).
4. Kamu BISA mengirim LEBIH DARI SATU tag <find> sekaligus jika ingin mengubah beberapa bagian.
5. Jika perubahannya besar, gunakan <code> untuk Full Rewrite (tulis ulang seluruh file).

CONTOH GANTI SEBAGIAN (Bisa Multipel Find):
<execution>
<responding>Saya telah menambahkan ikon FontAwesome dan merubah teks p.</responding>
<find>
<element>
  <title>Halo Dunia</title>
</element>
<change>
  <title>Halo Dunia</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</change>
</find>
<find>
<element>
  <p>Selamat datang.</p>
</element>
<change>
  <p><i class="fas fa-home"></i> Selamat datang kembali!</p>
</change>
</find>
</execution>

CONTOH GANTI SEMUA (Full Rewrite):
<execution>
<responding>Saya telah menulis ulang seluruh halaman.</responding>
<code><!DOCTYPE html>...seluruh kode baru...</html></code>
</execution>`;
                },

                showToast(msg) {
                    this.toastMsg = msg;
                    setTimeout(() => this.toastMsg = '', 3000);
                },

                scrollToBottom() {
                    setTimeout(() => {
                        const container = document.getElementById('chat-container');
                        if (container) container.scrollTop = container.scrollHeight;
                    }, 100);
                },

                uploadFile(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.codeBase = e.target.result;
                        this.showToast('File berhasil diunggah!');
                        this.tab = 'code';
                    };
                    reader.readAsText(file);
                    event.target.value = ''; // Reset input
                },

                copyCode() {
                    navigator.clipboard.writeText(this.codeBase);
                    this.showToast('Kode berhasil disalin!');
                },

                async sendPrompt() {
                    if (!this.userInput.trim() || this.isProcessing) return;

                    const prompt = this.userInput;
                    this.userInput = '';
                    this.chatHistory.push({ role: 'user', content: prompt });
                    this.scrollToBottom();
                    
                    this.isProcessing = true;
                    this.loopCount = 0;

                    await this.runAILoop(prompt);
                },

                async runAILoop(userInstruction, errorMessage = null) {
                    if (this.loopCount >= this.maxLoops) {
                        this.chatHistory.push({ 
                            role: 'ai', 
                            content: 'Maaf, saya gagal memodifikasi kode setelah 10 kali percobaan self-healing. Kode tidak berubah.' 
                        });
                        this.isProcessing = false;
                        this.scrollToBottom();
                        return;
                    }

                    try {
                        let finalPrompt = `${this.systemPrompt}\n\nInstruksi User: ${userInstruction}`;
                        
                        if (errorMessage) {
                            finalPrompt += `\n\n[SISTEM INFO - ERROR PADA PERCOBAAAN SEBELUMNYA]:\n${errorMessage}\n\nTolong perbaiki tag <element> kamu. Pastikan teks identik persis dengan Codebase! Jika kesulitan melakukan partial update, gunakan <code> untuk melakukan Full Rewrite.`;
                        }

                        const response = await fetch("https://puruboy-api.vercel.app/api/ai/gemini-v2", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ prompt: finalPrompt })
                        });

                        const data = await response.json();
                        if (!data.success) throw new Error("API error / gagal terhubung ke server.");

                        const aiText = data.result.answer;
                        this.parseAndApplyAIResponse(aiText);

                        // Berhasil, keluar dari loop
                        this.isProcessing = false;

                    } catch (error) {
                        console.warn(`Loop ${this.loopCount + 1} Gagal:`, error.message);
                        this.loopCount++;
                        await this.runAILoop(userInstruction, error.message);
                    }
                },

                parseAndApplyAIResponse(aiResponse) {
                    // Cari isi tag <execution>
                    const execMatch = aiResponse.match(/<execution>([\s\S]*?)<\/execution>/i);
                    if (!execMatch) throw new Error("Tag <execution> tidak ditemukan di jawabanmu.");
                    
                    const execContent = execMatch[1];

                    // Ambil teks <responding>
                    const respondMatch = execContent.match(/<responding>([\s\S]*?)<\/responding>/i);
                    let respondText = respondMatch ? respondMatch[1].trim() : "Kode berhasil diperbarui.";

                    // 1. Cek Mode FULL REWRITE <code>
                    const codeMatch = execContent.match(/<code>([\s\S]*?)<\/code>/i);
                    if (codeMatch) {
                        this.codeBase = codeMatch[1].trim();
                        this.chatHistory.push({ role: 'ai', content: respondText, action: 'Full Rewrite' });
                        this.scrollToBottom();
                        return; 
                    }

                    // 2. Cek Mode PARTIAL UPDATE (Multiple <find>)
                    // Mengambil semua tag <find> yang dikirim
                    const findBlocks = [...execContent.matchAll(/<find>([\s\S]*?)<\/find>/gi)];
                    
                    if (findBlocks.length > 0) {
                        // Kita gunakan temporary codebase. Jika 1 blok gagal, jangan rubah kode aslinya.
                        let tempCodeBase = this.codeBase;
                        let successCount = 0;

                        for (let i = 0; i < findBlocks.length; i++) {
                            const blockContent = findBlocks[i][1];
                            
                            const elementMatch = blockContent.match(/<element>([\s\S]*?)<\/element>/i);
                            const changeMatch = blockContent.match(/<change>([\s\S]*?)<\/change>/i);

                            if (!elementMatch || !changeMatch) {
                                throw new Error(`Di dalam tag <find> ke-${i+1}, tag <element> atau <change> tidak valid/hilang.`);
                            }

                            // LLM terkadang lolos dengan spasi berlebih, kita sediakan dua fallback
                            const rawElementText = elementMatch[1];
                            const trimmedElementText = rawElementText.trim();
                            const changeText = changeMatch[1]; // Kita tidak trim change agar format indentasi terjaga jika ada

                            // Cek persis sama
                            if (tempCodeBase.includes(rawElementText)) {
                                tempCodeBase = tempCodeBase.replace(rawElementText, changeText);
                                successCount++;
                            } 
                            // Cek versi trimmed (mengabaikan extra enter dari AI)
                            else if (tempCodeBase.includes(trimmedElementText) && trimmedElementText !== '') {
                                tempCodeBase = tempCodeBase.replace(trimmedElementText, changeText.trim());
                                successCount++;
                            } 
                            // Jika gagal menemukan
                            else {
                                throw new Error(`Teks yang kamu tulis pada blok <find> ke-${i+1} di dalam <element>:\n\n${rawElementText}\n\nTIDAK DITEMUKAN di codebase saat ini. Eksekusi DIBATALKAN. Gunakan teks persis atau gunakan <code>!`);
                            }
                        }

                        // Jika semua blok berhasil di-replace, baru simpan ke state
                        this.codeBase = tempCodeBase;
                        this.chatHistory.push({ 
                            role: 'ai', 
                            content: respondText, 
                            action: `Partial Update (${successCount} changes)` 
                        });
                        this.scrollToBottom();
                        return;
                    }

                    // Jika tidak ada mode <code> atau <find> sama sekali
                    throw new Error("Kamu harus memasukkan tag <code> atau blok <find> di dalam <execution>.");
                }
            }));
        });
    </script>
</body>
</html>
