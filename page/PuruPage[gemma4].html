<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Stream Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 220px); }
        .message-bubble { max-width: 85%; word-wrap: break-word; }
        .markdown-body { line-height: 1.6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Animasi cursor mengetik */
        .typing::after {
            content: '▊';
            display: inline-block;
            margin-left: 2px;
            animation: blink 1s steps(2, start) infinite;
            color: #6366f1;
        }
        @keyframes blink { to { visibility: hidden; } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-3xl mx-auto flex flex-col h-screen">
        <!-- Header -->
        <header class="p-4 border-b bg-white shadow-sm space-y-3">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                        Ollama Stream 
                        <span class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full uppercase tracking-tighter">Live</span>
                    </h1>
                    <p class="text-[10px] text-slate-500 font-mono">nirkyy-ollama-api.hf.space</p>
                </div>
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-2.5 h-2.5 bg-yellow-500 rounded-full animate-pulse"></span>
                    <span id="status-text" class="text-xs font-medium text-slate-600">Menghubungkan...</span>
                </div>
            </div>

            <!-- Model Selector -->
            <div class="flex items-center gap-2 bg-slate-100 p-2 rounded-lg">
                <label for="model-select" class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Model:</label>
                <select id="model-select" class="flex-1 bg-transparent text-sm font-medium focus:outline-none disabled:opacity-50" disabled>
                    <option value="">Memuat model...</option>
                </select>
                <button id="refresh-models" class="p-1 hover:bg-slate-200 rounded transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-box" class="chat-container overflow-y-auto p-4 space-y-4">
            <!-- Pesan awal -->
            <div class="flex justify-start">
                <div class="bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm message-bubble">
                    <p class="text-sm">Silakan pilih model dan ketik sesuatu. Respon akan muncul secara mengalir (streaming).</p>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="p-4 bg-white border-t">
            <form id="chat-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Tanyakan sesuatu..." 
                    class="flex-1 p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    disabled
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-medium transition-colors disabled:bg-slate-300 flex items-center gap-2"
                >
                    <span>Kirim</span>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const refreshBtn = document.getElementById('refresh-models');

        const BASE_URL = "https://nirkyy-ollama-api.hf.space";

        // 1. Fetch Models
        async function fetchModels() {
            modelSelect.disabled = true;
            statusDot.className = "w-2.5 h-2.5 bg-yellow-500 rounded-full animate-pulse";
            statusText.innerText = "Syncing Models...";

            try {
                const response = await fetch(`${BASE_URL}/api/tags`);
                const data = await response.json();
                
                modelSelect.innerHTML = '';
                if (data.models && data.models.length > 0) {
                    data.models.forEach(m => {
                        const option = document.createElement('option');
                        option.value = m.name;
                        option.innerText = m.name;
                        modelSelect.appendChild(option);
                    });
                    modelSelect.disabled = false;
                    sendBtn.disabled = false;
                    statusDot.className = "w-2.5 h-2.5 bg-green-500 rounded-full";
                    statusText.innerText = "Online";
                }
            } catch (err) {
                statusDot.className = "w-2.5 h-2.5 bg-red-500 rounded-full";
                statusText.innerText = "Connection Error";
                console.error("Tags failed:", err);
            }
        }

        // 2. Helper to create a message bubble for streaming
        function createAiBubble() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start';
            
            const bubble = document.createElement('div');
            bubble.className = 'bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm message-bubble typing';
            
            const textNode = document.createElement('p');
            textNode.className = 'text-sm whitespace-pre-wrap';
            
            bubble.appendChild(textNode);
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            return { bubble, textNode };
        }

        function addMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? 'flex justify-end' : 'flex justify-start';
            const bubble = document.createElement('div');
            bubble.className = isUser 
                ? 'bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none shadow-md message-bubble' 
                : 'bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm message-bubble';
            bubble.innerHTML = `<p class="text-sm whitespace-pre-wrap">${text}</p>`;
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 3. Handle Streaming Chat
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            const selectedModel = modelSelect.value;

            if (!message || !selectedModel) return;

            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;

            const { bubble, textNode } = createAiBubble();
            let fullText = "";

            try {
                const response = await fetch(`${BASE_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: selectedModel,
                        prompt: message,
                        stream: true // MENGAKTIFKAN STREAMING
                    })
                });

                if (!response.ok) throw new Error("Gagal mengambil stream");

                // Membaca stream menggunakan Reader
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    
                    // Split berdasarkan baris karena Ollama mengirimkan multiple JSON objects
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const json = JSON.parse(line);
                            if (json.response) {
                                fullText += json.response;
                                textNode.innerText = fullText;
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                            if (json.done) {
                                bubble.classList.remove('typing');
                            }
                        } catch (e) {
                            console.warn("JSON parse error in stream chunk", e);
                        }
                    }
                }

            } catch (error) {
                bubble.classList.remove('typing');
                textNode.innerText = `Terjadi kesalahan: ${error.message}`;
                textNode.classList.add('text-red-500');
            } finally {
                sendBtn.disabled = false;
            }
        });

        refreshBtn.addEventListener('click', fetchModels);
        window.onload = fetchModels;
    </script>
</body>
</html>
