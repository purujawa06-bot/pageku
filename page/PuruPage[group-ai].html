    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-dark-bg text-gray-200 antialiased overflow-hidden h-[100dvh]; }
        }
        @layer components {
            .input-field { @apply w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-2 text-sm focus:border-accent-primary focus:ring-1 focus:ring-accent-primary outline-none transition-all; }
            .btn-primary { @apply bg-gradient-to-r from-accent-primary to-accent-secondary text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-blue-500/20 active:scale-95 transition-transform disabled:opacity-50 disabled:grayscale; }
            .chat-bubble-ai { @apply bg-dark-panel border border-dark-border rounded-2xl rounded-tl-none p-4 text-sm leading-relaxed shadow-sm break-words overflow-hidden whitespace-pre-line w-fit; }
            .chat-bubble-user { @apply bg-accent-primary text-white rounded-2xl rounded-tr-none p-4 text-sm leading-relaxed shadow-md break-words overflow-hidden whitespace-pre-line w-fit; }
            .reply-preview { @apply bg-black/20 border-l-2 border-white/30 p-2 mb-2 rounded text-[11px] italic opacity-90 max-w-full overflow-hidden cursor-pointer hover:bg-black/40 transition-colors; }
            .scrollbar-hide::-webkit-scrollbar { display: none; }

            @keyframes highlight-pulse {

            <div class="flex-1 overflow-y-auto p-4 space-y-2">

                    <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition-colors">
                        <img :src="`https://api.dicebear.com/7.x/bottts/svg?seed=${char.name}`"

                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h2 class="font-bold text-accent-primary">Group AI</h2>
                </div>

                        <div class="text-xs font-bold text-accent-primary" x-text="totalTokens()"></div>
                    </div>
                    <button @click="resetChat()" class="text-xs font-bold text-red-400 bg-red-400/10 px-3 py-1 rounded-full">
                        Clear
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div id="msg-container" 
                 @scroll="handleScroll"
                 class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scrollbar-hide scroll-smooth">
                <template x-for="(msg, index) in chatHistory" :key="msg.id">
                    <div :id="msg.id" :class="`flex gap-2 md:gap-3 transition-all duration-500 ${msg.sender === userProfile.name ? 'flex-row-reverse' : 'flex-row'}`">
                        <img :src="getAvatar(msg.sender)" class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-dark-border bg-dark-surface shadow-sm flex-shrink-0 mt-1">
                        <div :class="`flex flex-col min-w-0 max-w-[80%] md:max-w-[70%] ${msg.sender === userProfile.name ? 'items-end' : 'items-start'}`">
                            <span class="text-[10px] font-mono text-gray-500 mb-1 px-2 uppercase tracking-widest" x-text="`${msg.sender}`"></span>
                            <div :class="msg.sender === userProfile.name ? 'chat-bubble-user' : 'chat-bubble-ai'" class="max-w-full">
                                <template x-if="msg.replyTo && getMessageById(msg.replyTo)">
                                    <div class="reply-preview" @click="scrollToMessage(msg.replyTo)">
                                        <div class="font-bold truncate text-[10px]" x-text="getMessageById(msg.replyTo).sender"></div>
                                        <div class="truncate opacity-80 text-[10px]" x-text="getMessageById(msg.replyTo).text"></div>
                                    </div>
                                </template>
                                <div class="whitespace-pre-wrap text-sm inline">
                                    <span x-text="msg.text"></span><span x-show="msg.isStreaming" class="inline-block w-1.5 h-4 bg-accent-primary animate-pulse ml-1 align-middle"></span>
                                </div>
                            </div>

                <!-- Typing Indicator -->

                        <div class="w-1.5 h-1.5 bg-accent-primary rounded-full animate-bounce [animation-delay:0.2s]"></div>
                        <div class="w-1.5 h-1.5 bg-accent-primary rounded-full animate-bounce [animation-delay:0.4s]"></div>
                    </div>
                </div>

            <!-- Scroll Bottom Button -->
            <button x-show="showScrollBtn" 
                    @click="scrollToBottom()"
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    class="absolute bottom-24 right-6 z-10 bg-accent-primary text-white p-3 rounded-full shadow-xl hover:scale-110 active:scale-90 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </button>

            <!-- Input Area -->
            <div class="p-3 md:p-6 bg-dark-surface border-t border-dark-border flex-shrink-0">
                <div class="max-w-4xl mx-auto flex items-end gap-2 md:gap-3">
                    <div class="flex-1 bg-dark-panel rounded-2xl border border-dark-border p-1 md:p-2 focus-within:border-accent-primary transition-colors min-w-0">
                        <textarea x-model="userInput" 
                                  @keydown.enter.prevent="!isAITurn && sendMessage()"

                                  :placeholder="isAITurn ? 'Menunggu AI...' : 'Tulis pesan...'"

                    </div>
                    
                    <button x-show="!isAITurn" @click="sendMessage()" class="bg-accent-primary p-3 md:px-6 rounded-2xl font-bold shadow-lg shadow-blue-500/20 active:scale-90 transition-transform">
                        <span class="hidden md:inline">Kirim</span>
                        <svg class="md:hidden w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </button>

                    <button x-show="isAITurn" @click="triggerAI()" :disabled="isTyping" class="bg-green-500 text-dark-bg p-3 md:px-6 rounded-2xl font-black shadow-lg shadow-green-500/20 active:scale-90 transition-transform disabled:opacity-50">
                        <span class="hidden md:inline">Lanjutkan AI</span>
                        <span class="md:hidden text-lg">➔</span>
                    </button>
                </div>

        </main>

    <script>
        function chatApp() {
            return {
                screen: 'setup',
                characters: [],
                userProfile: { name: '', personality: '' },
                chatHistory: [],
                userInput: '',
                newAI: { name: '', personality: '' },
                nextTurnId: null,
                isAITurn: false,
                isTyping: false,
                autoLoop: false,
                showScrollBtn: false,
                apiUrl: 'https://puruboy-api.vercel.app/api/ai/gemini-v2',

                getAvatar(name) {
                    if (name === this.userProfile.name) {
                        return `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(name)}`;
                    }
                    return `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(name)}`;
                },

                getMessageById(id) {
                    return this.chatHistory.find(m => m.id === id);
                },

                countTokens(str) {
                    if (!str) return 0;
                    return Math.ceil(str.length / 4);
                },

                totalTokens() {
                    let allText = this.userProfile.name + " " + this.userProfile.personality + " ";
                    this.characters.forEach(c => allText += c.name + " " + c.personality + " ");
                    this.chatHistory.forEach(m => allText += m.sender + " " + m.text + " ");
                    return this.countTokens(allText);
                },

                init() {
                    this.characters = JSON.parse(localStorage.getItem('gai_chars') || '[]');
                    this.userProfile = JSON.parse(localStorage.getItem('gai_user') || '{"name":"","personality":""}');
                    this.chatHistory = JSON.parse(localStorage.getItem('gai_chat') || '[]');
                    this.autoLoop = JSON.parse(localStorage.getItem('gai_autoloop') || 'false');
                },

                save() {
                    localStorage.setItem('gai_chars', JSON.stringify(this.characters));
                    localStorage.setItem('gai_user', JSON.stringify(this.userProfile));
                    localStorage.setItem('gai_chat', JSON.stringify(this.chatHistory));
                    localStorage.setItem('gai_autoloop', JSON.stringify(this.autoLoop));
                },

                addChar() {
                    if(!this.newAI.name || !this.newAI.personality) return;
                    this.characters.push({
                        id: Date.now().toString(),
                        name: this.newAI.name,
                        personality: this.newAI.personality
                    });
                    this.newAI = { name: '', personality: '' };
                    this.save();
                },

                removeChar(id) {
                    this.characters = this.characters.filter(c => c.id !== id);
                    this.save();
                },

                startChat() {
                    this.save();
                    this.screen = 'chat';
                    
                    if (this.chatHistory.length === 0 && this.characters.length > 0) {
                        this.nextTurnId = this.characters[0].id;
                        this.isAITurn = true;
                    }
                },

                handleScroll(e) {
                    const el = e.target;
                    // Tampilkan tombol jika user scroll ke atas lebih dari 200px dari bawah
                    this.showScrollBtn = (el.scrollHeight - el.scrollTop - el.clientHeight) > 200;
                },

                scrollToBottom(behavior = 'smooth') {
                    const el = document.getElementById('msg-container');
                    if(el) {
                        el.scrollTo({ top: el.scrollHeight, behavior: behavior });
                    }
                },

                scrollToMessage(id) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('msg-highlight');
                        setTimeout(() => {
                            el.classList.remove('msg-highlight');
                        }, 2000);
                    }
                },

                sendMessage() {
                    if(!this.userInput.trim() || this.isTyping) return;
                    
                    const text = this.userInput.trim().replace(/\n{3,}/g, '\n\n');
                    const msgId = 'msg-' + Math.random().toString(36).substr(2, 5);
                    this.chatHistory.push({ id: msgId, sender: this.userProfile.name, text: text });
                    this.userInput = '';
                    this.save();

                    // Pilih AI secara acak untuk merespon user
                    const randomAI = this.characters[Math.floor(Math.random() * this.characters.length)];
                    this.nextTurnId = randomAI.id;
                    this.isAITurn = true;

                    setTimeout(() => this.triggerAI(), 500);
                },

                async triggerAI() {
                    // Mencegah eksekusi ganda jika sedang mengetik atau tidak ada giliran
                    if (this.isTyping || !this.nextTurnId) return;
                    
                    const char = this.characters.find(c => c.id === this.nextTurnId);
                    if(!char) return;

                    this.isTyping = true; // Mulai proses (Loading API)

                    try {
                        const prompt = this.buildPrompt(char);
                        const res = await fetch(this.apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt })
                        });
                        
                        const data = await res.json();
                        const answer = data?.result?.answer || '';
                        if (!answer) throw new Error("Response API kosong");

                        // Parse response XML
                        let msgFull = answer.match(/<message>([\s\S]*?)<\/message>/i)?.[1] || answer;
                        msgFull = msgFull.trim().replace(/\n{3,}/g, '\n\n');
                        const replyId = answer.match(/<reply>([\s\S]*?)<\/reply>/i)?.[1] || null;
                        const call = (answer.match(/<call>([\s\S]*?)<\/call>/i)?.[1] || '').toLowerCase();
                        
                        // Buat objek pesan dan tampilkan langsung
                        const msgId = 'ai-' + Math.random().toString(36).substr(2, 5);
                        const newMsg = { 
                            id: msgId, 
                            sender: char.name, 
                            text: msgFull, 
                            replyTo: (replyId && replyId !== 'null' && replyId !== '') ? replyId : null,
                            isStreaming: false 
                        };
                        this.chatHistory.push(newMsg);
                        this.isTyping = false;
                        this.scrollToBottom('smooth');
                        this.save();

                        // Logika Giliran Selanjutnya
                        let nextCharId = null;
                        const lowerCaseCall = call.trim();
                        // Cek apakah AI memanggil 'user' atau nama spesifik user
                        const isCallingUser = lowerCaseCall.includes('user') || 
                                            (this.userProfile.name && lowerCaseCall.includes(this.userProfile.name.toLowerCase()));
                        
                        if (lowerCaseCall && !isCallingUser) {
                            const target = this.characters.find(c => lowerCaseCall.includes(c.name.toLowerCase()));
                            if (target) nextCharId = target.id;
                        }

                        if (nextCharId) {
                            this.nextTurnId = nextCharId;
                            this.isAITurn = true;
                            setTimeout(() => this.triggerAI(), 1000);
                        } else if (this.autoLoop && !isCallingUser) {
                            // Hanya lanjut auto-loop jika TIDAK memanggil user
                            const otherChars = this.characters.filter(c => c.id !== char.id);
                            const randomNext = otherChars[Math.floor(Math.random() * otherChars.length)] || char;
                            this.nextTurnId = randomNext.id;
                            this.isAITurn = true;
                            setTimeout(() => this.triggerAI(), 1500);
                        } else {
                            this.isAITurn = false;
                            this.nextTurnId = null;
                        }

                    } catch (e) {
                        console.error("AI Error:", e);
                        this.isTyping = false;
                        this.isAITurn = false;
                        this.nextTurnId = null;
                    }
                },

                buildPrompt(char) {
                    const charList = this.characters.map(c => `- ${c.name}: ${c.personality}`).join('\n');
                    const systemInstruction = `Kamu adalah ${char.name}. 
Kepribadianmu: ${char.personality}

Anggota Grup:
- ${this.userProfile.name} (User): ${this.userProfile.personality}
${charList}

ATURAN:
1. Jawab HANYA dalam format XML: <response><reply>id_pesan_yang_dibalas_atau_kosong</reply><message>isi pesan</message><call>nama_karakter_selanjutnya_atau_user</call></response>
2. Jika ingin membalas pesan spesifik, masukkan ID pesan tersebut di tag <reply>. Jika tidak, kosongkan atau isi null.
3. Berinteraksilah secara natural seperti di grup WA/Telegram.
4. Gunakan bahasa Indonesia santai jika perlu.`;

                    const footer = `\n\nGiliran ${char.name} menjawab:`;
                    
                    // Hitung token awal (instruksi + footer)
                    let currentTokens = this.countTokens(systemInstruction) + this.countTokens(footer);
                    const maxTokens = 5000;
                    let historyStrings = [];

                    // Ambil history dari yang terbaru, masukkan selama belum limit
                    for (let i = this.chatHistory.length - 1; i >= 0; i--) {
                        const m = this.chatHistory[i];
                        const msgStr = `[ID: ${m.id}] ${m.sender}: ${m.text}`;
                        const msgTokens = this.countTokens(msgStr) + 2; // +2 untuk estimasi newline/overhead
                        
                        if (currentTokens + msgTokens > maxTokens) break;
                        
                        historyStrings.unshift(msgStr);
                        currentTokens += msgTokens;
                    }
                    
                    const historySection = historyStrings.length > 0 ? `\n\nRIWAYAT:\n${historyStrings.join('\n')}` : '';

                    return `${systemInstruction}${historySection}${footer}`;
                },

                resetChat() {
                    if(confirm("Hapus semua riwayat percakapan?")) {
                        this.chatHistory = [];
                        this.isAITurn = false;
                        this.isTyping = false;
                        this.nextTurnId = null;
                        this.save();
                        
                        // Jika ada karakter, siapkan giliran AI pertama jika ingin memulai diskusi lagi
                        if(this.characters.length > 0) {
                            this.nextTurnId = this.characters[0].id;
                            this.isAITurn = true;
                        }
                    }
                }
            }
        }
    </script>
</body>
