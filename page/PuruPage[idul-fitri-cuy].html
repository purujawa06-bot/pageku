<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktif Idul Fitri 1447H</title>
    <style>
        :root {
            --gold: #f59e0b;
            --emerald: #064e3b;
            --light-gold: #fbbf24;
            --bg: #020617;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .main-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 500px;
            pointer-events: none;
        }

        .card {
            background: rgba(6, 78, 59, 0.4);
            backdrop-filter: blur(15px);
            border: 2px solid var(--gold);
            border-radius: 30px;
            padding: 2rem;
            margin: 1rem;
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(245, 158, 11, 0.2);
            transition: transform 0.3s ease;
        }

        .card:active {
            transform: scale(0.99);
        }

        .bedug-container {
            margin-bottom: 1.5rem;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s;
        }

        .bedug-container:active {
            transform: scale(1.2) rotate(5deg);
        }

        .bedug-icon {
            font-size: 5rem;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        h1 {
            font-family: 'serif';
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .arabic {
            font-size: 2.2rem;
            margin: 1rem 0;
            color: var(--light-gold);
            font-family: "Times New Roman", serif;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        button {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .primary-btn {
            background: var(--gold);
            color: var(--emerald);
        }

        .secondary-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #wisdom-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            font-style: italic;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideUp 0.5s ease-out;
            border-left: 4px solid var(--gold);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shakeAnim 0.2s infinite;
        }

        @keyframes shakeAnim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        .lantern {
            position: absolute;
            top: -50px;
            font-size: 2.5rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <div class="main-ui">
        <div class="card" id="mainCard">
            <div class="bedug-container" onclick="hitBedug(event)">
                <div class="bedug-icon" id="bedug">🥁</div>
                <div style="font-size: 0.8rem; margin-top: 5px; color: var(--gold)">KETUK BEDUG</div>
            </div>

            <div class="arabic">عيد مبارك</div>
            <h1>1447 H</h1>
            <p style="color: #cbd5e1">Mohon Maaf Lahir & Batin</p>

            <div id="wisdom-box">
                Ketuk tombol di bawah untuk mengambil hikmah Idul Fitri...
            </div>

            <div class="btn-group">
                <button class="primary-btn" onclick="triggerShow()">
                    <span>✨</span> Meriahkan!
                </button>
                <button class="secondary-btn" onclick="getWisdom()">
                    <span>📜</span> Ambil Hikmah
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const wisdomBox = document.getElementById('wisdom-box');
        const bedug = document.getElementById('bedug');
        const card = document.getElementById('mainCard');

        let width, height;
        let particles = [];
        let fireworks = [];
        let cursorParticles = [];

        const wisdoms = [
            "Kemenangan sejati adalah saat kita mampu menaklukkan ego diri sendiri.",
            "Semoga Allah menerima amal ibadah kita dan menjadikan kita kembali suci.",
            "Maafkanlah masa lalu agar masa depanmu terasa lebih ringan.",
            "Idul Fitri adalah momen untuk menyambung silaturahmi yang sempat terputus.",
            "Kesucian hati dimulai dengan lisan yang terjaga dan rasa syukur yang dalam.",
            "Taqabbalallahu minna wa minkum, semoga keberkahan selalu menyertaimu.",
            "Bukan pakaian baru yang utama, tapi ketaatan yang bertambah di hadapan-Nya."
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, speed, size) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = size || Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * (speed || 5);
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.alpha = 1;
                this.gravity = 0.05;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= 0.015;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y, color || `hsl(${Math.random() * 360}, 100%, 60%)`));
            }
        }

        function hitBedug(e) {
            // Animasi bedug
            bedug.classList.add('shake');
            setTimeout(() => bedug.classList.remove('shake'), 300);
            
            // Getaran visual pada kartu
            card.style.transform = "scale(1.05)";
            setTimeout(() => card.style.transform = "scale(1)", 100);

            // Efek kembang api kecil di sekitar bedug
            const rect = bedug.getBoundingClientRect();
            for(let i=0; i<3; i++) {
                createExplosion(rect.left + rect.width/2, rect.top + rect.height/2, '#f59e0b');
            }
        }

        function getWisdom() {
            wisdomBox.style.animation = 'none';
            void wisdomBox.offsetWidth; // trigger reflow
            wisdomBox.style.animation = 'slideUp 0.5s ease-out';
            
            const randomWisdom = wisdoms[Math.floor(Math.random() * wisdoms.length)];
            wisdomBox.innerHTML = `<span>"</span>${randomWisdom}<span>"</span>`;
        }

        function triggerShow() {
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    createExplosion(Math.random() * width, Math.random() * height * 0.7);
                }, i * 150);
            }
        }

        // Interaksi Cursor
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) {
                cursorParticles.push({
                    x: e.clientX,
                    y: e.clientY,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    alpha: 1,
                    size: Math.random() * 4
                });
            }
        });

        function animate() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Update particles ledakan
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // Update partikel kursor (Bintang-bintang emas)
            for (let i = cursorParticles.length - 1; i >= 0; i--) {
                const p = cursorParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.02;
                
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = '#f59e0b';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (p.alpha <= 0) cursorParticles.splice(i, 1);
            }

            // Random ambient firework
            if(Math.random() < 0.02) {
                createExplosion(Math.random() * width, Math.random() * height * 0.5);
            }

            requestAnimationFrame(animate);
        }

        window.onload = () => {
            animate();
            // Start with a message
            getWisdom();
        };

        // Support mobile touch
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            createExplosion(touch.clientX, touch.clientY);
        });

    </script>
</body>
</html>
